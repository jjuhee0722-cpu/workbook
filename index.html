// ══════════════════════════════════════════════════════════
//  IndexedDB 레이어 — 캐시/쿠키 삭제에도 데이터 보존
// ══════════════════════════════════════════════════════════
const DB_NAME    = "workbook_db";
const DB_VERSION = 1;
const STORES     = { entries: "entries", cats: "cats", contacts: "contacts", meta: "meta" };

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      Object.values(STORES).forEach(name => {
        if (!db.objectStoreNames.contains(name)) db.createObjectStore(name, { keyPath: "id" });
      });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function idbGetAll(store) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, "readonly");
    const req = tx.objectStore(store).getAll();
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function idbPut(store, obj) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, "readwrite");
    const req = tx.objectStore(store).put(obj);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

async function idbDelete(store, id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, "readwrite");
    const req = tx.objectStore(store).delete(id);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

async function idbClear(store) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, "readwrite");
    const req = tx.objectStore(store).clear();
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

// meta 단건 (cats 등 배열 통째로 저장)
async function idbGetMeta(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORES.meta, "readonly");
    const req = tx.objectStore(STORES.meta).get(key);
    req.onsuccess = e => resolve(e.target.result?.value ?? null);
    req.onerror   = e => reject(e.target.error);
  });
}
async function idbSetMeta(key, value) {
  await idbPut(STORES.meta, { id: key, value });
}

const pad      = n => String(n).padStart(2,"0");
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const fmtTs    = ts => { const d=new Date(ts); return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; };

function fileToB64(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); });
}
function fileToAttachment(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res({name:file.name,type:file.type,size:file.size,data:e.target.result}); r.onerror=rej; r.readAsDataURL(file); });
}
function fmtSize(b){ return b<1024?b+"B":b<1048576?(b/1024).toFixed(1)+"KB":(b/1048576).toFixed(1)+"MB"; }
function attachIcon(t){
  if(!t) return "📎";
  if(t.includes("pdf")) return "📄";
  if(t.includes("word")||t.includes("document")) return "📝";
  if(t.includes("sheet")||t.includes("excel")||t.includes("spreadsheet")) return "📊";
  if(t.includes("presentation")||t.includes("powerpoint")) return "📑";
  if(t.includes("text")) return "📃";
  if(t.includes("zip")||t.includes("archive")||t.includes("compressed")) return "🗜️";
  return "📎";
}
// 구 버전(photo 단일) → 신 버전(photos 배열) 마이그레이션

const migrateContact = c=>({...c, photos:c.photos||(c.photo?[c.photo]:[])});
function getDday(dl) {
  if(!dl) return null;
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(dl); d.setHours(0,0,0,0);
  const diff=Math.round((d-t)/86400000);
  if(diff===0) return {label:"D-Day",color:"#c0392b"};
  if(diff>0)   return {label:"D-"+diff, color:diff<=3?"#e67e22":"#2980b9"};
  return {label:"D+"+Math.abs(diff)+" 초과",color:"#aaa"};
}

// ── 엑셀 ─────────────────────────────────────────────────
function exportXLSX(entries, cats, contacts) {
  const getCat = id => cats.find(c=>c.id===id)||{label:id};
  const getPri = id => PRIS.find(p=>p.id===id)||PRIS[1];
  const wb = XLSX_LIB.utils.book_new();
  // 항목 시트
  const eRows = entries.map(e=>({
    분류:getCat(e.category).label, 우선순위:getPri(e.priority).label,
    날짜:e.date, 마감기한:e.deadline||"", 제목:e.title, 내용:e.body||"",
    태그:(e.tags||[]).join(", "), 완료:e.done?"완료":"미완료",
    등록일시:fmtTs(e.createdAt), 수정일시:fmtTs(e.updatedAt),
  }));
  const ws1 = XLSX_LIB.utils.json_to_sheet(eRows);
  ws1["!cols"]=[14,9,12,12,30,40,20,7,18,18].map(w=>({wch:w}));
  XLSX_LIB.utils.book_append_sheet(wb,ws1,"업무 항목");
  // 담당자 시트
  const cRows = contacts.map(c=>({ 회사:c.company||"", 직함:c.title||"", 성함:c.name||"", 업무:c.role||"", 연락처:c.phone||"", 이메일:c.email||"", 메모:c.memo||"" }));
  const ws2 = XLSX_LIB.utils.json_to_sheet(cRows);
  ws2["!cols"]=[18,14,12,20,16,24,30].map(w=>({wch:w}));
  XLSX_LIB.utils.book_append_sheet(wb,ws2,"담당자");
  XLSX_LIB.writeFile(wb,"업무수첩_"+todayStr()+".xlsx");
}

function SelectionBar({selected,entries,cats,onClear,onMarkDone,onMarkUndone,onDelete,barRef}) {
  const selEntries  = entries.filter(e=>selected.has(e.id));
  const doneCount   = selEntries.filter(e=>e.done).length;

  const catCounts   = {};
  selEntries.forEach(e=>{ catCounts[e.category]=(catCounts[e.category]||0)+1; });
  const catSummary  = Object.entries(catCounts).map(([id,cnt])=>{ const c=cats.find(x=>x.id===id)||{icon:"◆",label:id,color:"#888"}; return {c,cnt}; });

  return (
    <div ref={barRef} style={{background:"#1a1a2e",color:"#fff",padding:"8px 14px 10px",boxShadow:"0 3px 12px rgba(0,0,0,0.3)"}}>
      {/* 선택 요약 */}

        <span style={{fontWeight:700,fontSize:13}}>{selected.size}개 선택됨</span>

          {catSummary.map(({c,cnt})=>(

        {undoneCount>0&&<button onClick={onMarkDone}   style={{padding:"6px 12px",border:"none",borderRadius:7,background:"#27ae60",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>✓ 완료({undoneCount})</button>}

        </div>

    </div>
  );
}

function CatManageModal({cats,onSave,onClose}) {
  const [list,setList]       = useState(cats.map(c=>({...c})));
  const [editing,setEditing] = useState(null);
  const [newLabel,setNewLabel]= useState("");
  const [newIcon,setNewIcon]  = useState("◆");
  const [newColor,setNewColor]= useState("#2980b9");

  const upd=(id,k,v)=>setList(p=>p.map(c=>c.id===id?{...c,[k]:v}:c));
  const del=(id)=>{ if(list.length<=1){alert("최소 1개 필요");return;} if(!window.confirm("삭제 시 해당 분류 항목은 첫 번째 분류로 이동합니다."))return; setList(p=>p.filter(c=>c.id!==id)); };
  const add=()=>{ if(!newLabel.trim())return; setList(p=>[...p,{id:uid(),label:newLabel.trim(),icon:newIcon,color:newColor}]); setNewLabel("");setNewIcon("◆");setNewColor("#2980b9"); };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"16px 16px 0 0",padding:"20px 18px 36px",width:"100%",maxWidth:560,maxHeight:"88vh",overflowY:"auto",boxSizing:"border-box"}}>
        <div style={{width:40,height:4,background:"#ddd",borderRadius:2,margin:"0 auto 16px"}}/>
        <div style={{fontWeight:700,fontSize:16,color:"#1a1a2e",marginBottom:16}}>분류 관리</div>

        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {list.map(cat=>(
            <div key={cat.id} style={{border:"1px solid #eee",borderRadius:10,padding:"10px 12px",borderLeft:"4px solid "+cat.color,background:colorToBg(cat.color)+"44"}}>
              {editing===cat.id?(
                <div>
                  <div style={{marginBottom:8}}><Lbl>이름</Lbl><input value={cat.label} onChange={e=>upd(cat.id,"label",e.target.value)} style={{width:"100%",padding:"8px 10px",border:"1px solid #ddd",borderRadius:7,fontSize:14,boxSizing:"border-box"}}/></div>
                  <div style={{marginBottom:8}}><Lbl>아이콘</Lbl><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{ICON_OPTIONS.map(ic=><button key={ic} onClick={()=>upd(cat.id,"icon",ic)} style={{width:34,height:34,border:cat.icon===ic?"2px solid "+cat.color:"1px solid #ddd",borderRadius:7,background:cat.icon===ic?colorToBg(cat.color):"#fff",fontSize:16,cursor:"pointer"}}>{ic}</button>)}</div></div>
                  <div style={{marginBottom:10}}><Lbl>색상</Lbl><div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>{COLOR_PRESETS.map(col=><div key={col} onClick={()=>upd(cat.id,"color",col)} style={{width:26,height:26,borderRadius:"50%",background:col,cursor:"pointer",border:cat.color===col?"3px solid #1a1a2e":"2px solid transparent"}}/>)}<input type="color" value={cat.color} onChange={e=>upd(cat.id,"color",e.target.value)} style={{width:26,height:26,border:"none",borderRadius:"50%",cursor:"pointer",padding:0}}/></div></div>
                  <button onClick={()=>setEditing(null)} style={{padding:"7px 16px",border:"none",borderRadius:7,background:"#1a1a2e",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>완료</button>
                </div>
              ):(
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:18}}>{cat.icon}</span>
                  <span style={{flex:1,fontSize:14,fontWeight:600,color:cat.color}}>{cat.label}</span>
                  <button onClick={()=>setEditing(cat.id)} style={{padding:"5px 12px",border:"1px solid #ddd",borderRadius:6,background:"#fff",fontSize:12,cursor:"pointer",color:"#444"}}>수정</button>
                  <button onClick={()=>del(cat.id)} style={{padding:"5px 10px",border:"1px solid #fcc",borderRadius:6,background:"#fff",fontSize:12,cursor:"pointer",color:"#c0392b"}}>삭제</button>
                </div>
              )}
            </div>
          ))}
        </div>

        <div style={{border:"1px dashed #ccc",borderRadius:10,padding:"14px"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#555",marginBottom:10}}>+ 새 분류 추가</div>
          <Lbl>이름</Lbl>
          <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="분류 이름" style={{width:"100%",padding:"9px 10px",border:"1px solid #ddd",borderRadius:7,fontSize:14,boxSizing:"border-box",marginBottom:10}}/>
          <Lbl>아이콘</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>{ICON_OPTIONS.map(ic=><button key={ic} onClick={()=>setNewIcon(ic)} style={{width:32,height:32,border:newIcon===ic?"2px solid #1a1a2e":"1px solid #ddd",borderRadius:7,background:newIcon===ic?"#e8e8f0":"#fff",fontSize:15,cursor:"pointer"}}>{ic}</button>)}</div>
          <Lbl>색상</Lbl>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:14}}>{COLOR_PRESETS.map(col=><div key={col} onClick={()=>setNewColor(col)} style={{width:24,height:24,borderRadius:"50%",background:col,cursor:"pointer",border:newColor===col?"3px solid #1a1a2e":"2px solid transparent"}}/>)}<input type="color" value={newColor} onChange={e=>setNewColor(e.target.value)} style={{width:24,height:24,border:"none",borderRadius:"50%",cursor:"pointer",padding:0}}/></div>
          <button onClick={add} disabled={!newLabel.trim()} style={{width:"100%",padding:"11px",border:"none",borderRadius:9,background:newLabel.trim()?"#1a1a2e":"#ccc",color:"#fff",fontSize:14,fontWeight:700,cursor:newLabel.trim()?"pointer":"not-allowed"}}>추가</button>
        </div>

        <div style={{display:"flex",gap:10,marginTop:18}}>
          <button onClick={onClose} style={{flex:1,padding:"13px",border:"1px solid #ddd",borderRadius:10,background:"#fff",fontSize:15,cursor:"pointer",color:"#555"}}>취소</button>
          <button onClick={()=>{onSave(list);onClose();}} style={{flex:2,padding:"13px",border:"none",borderRadius:10,background:"#27ae60",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>저장</button>
        </div>
      </div>
    </div>
  );
}

//  담당자 연락처 탭

// 담당자 탭 전용 저장 버튼 (상태 피드백 포함)
function SaveBtn({list, onForceSave}) {
  const [st, setSt] = useState("idle"); // idle | saving | ok | error
  async function handleSave() {
    if(st==="saving") return;
    setSt("saving");
    try {
      await onForceSave([...list]);
      setSt("ok");
    } catch(e) {
      setSt("error");
    }
    setTimeout(()=>setSt("idle"), 2200);
  }
  const MAP = {
    idle:   {label:"💾 저장",  bg:"#27ae60", disabled:false},
    saving: {label:"저장 중…", bg:"#95a5a6", disabled:true},
    ok:     {label:"✓ 저장됨", bg:"#2ecc71", disabled:true},
    error:  {label:"⚠ 오류",   bg:"#e74c3c", disabled:false},
  };
  const m = MAP[st];
  return (
    <button onClick={handleSave} disabled={m.disabled}
      style={{padding:"10px 13px",background:m.bg,color:"#fff",border:"none",borderRadius:8,
        fontSize:13,fontWeight:700,cursor:m.disabled?"default":"pointer",
        transition:"background 0.2s",whiteSpace:"nowrap",flexShrink:0}}>
      {m.label}
    </button>
  );
}

function ContactTab({contacts,onSave,onForceSave}) {
  const [list,setList]       = useState(contacts);
  const [modal,setModal]     = useState(null);
  const [search,setSearch]   = useState("");
  const [dragIdx,setDragIdx] = useState(null);
  const [overIdx,setOverIdx] = useState(null);
  const cardRefs   = useRef([]);
  const dragIdxRef = useRef(null);
  const overIdxRef = useRef(null);

  useEffect(()=>{ setList(contacts); },[contacts]);

  const blank = ()=>({id:uid(),company:"",title:"",name:"",role:"",phone:"",email:"",memo:"",photos:[]});

  function save(form) {
    const next = modal.contact
      ? list.map(c=>c.id===modal.contact.id?{...form,id:modal.contact.id}:c)
      : [...list,{...form,id:uid()}];
    setList(next); onSave(next); setModal(null);
  }
  function del(id) {
    if(!window.confirm("삭제하시겠습니까?"))return;
    const next=list.filter(c=>c.id!==id); setList(next); onSave(next);
  }

  const filtered = list.filter(c=>{
    if(!search) return true;
    const q=search.toLowerCase();
    return [c.company,c.title,c.name,c.role,c.phone,c.email,c.memo].some(v=>(v||"").toLowerCase().includes(q));
  });

  // ── 드래그 앤 드롭 ──────────────────────────────────
  // listRef: commitDrag 클로저 내에서 항상 최신 list를 읽기 위해 사용
  const listRef = useRef(list);
  useEffect(()=>{ listRef.current = list; }, [list]);

  const canDrag    = !search;
  const isDragging = dragIdx !== null;

  function getCardAtY(y) {
    for(let i=0;i<cardRefs.current.length;i++){
      const el=cardRefs.current[i];
      if(!el) continue;
      const r=el.getBoundingClientRect();
      if(y>=r.top&&y<=r.bottom) return i;
    }
    return null;
  }
  function beginDrag(i){
    dragIdxRef.current=i; overIdxRef.current=i;
    setDragIdx(i); setOverIdx(i);
  }
  function updateDrag(clientY){
    const idx=getCardAtY(clientY);
    if(idx!==null&&idx!==overIdxRef.current){ overIdxRef.current=idx; setOverIdx(idx); }
  }
  function commitDrag(){
    const from=dragIdxRef.current, to=overIdxRef.current;
    if(from!==null&&to!==null&&from!==to){
      const arr=[...listRef.current];
      const [item]=arr.splice(from,1);
      arr.splice(to,0,item);
      setList(arr); onSave(arr);
    }
    dragIdxRef.current=null; overIdxRef.current=null;
    setDragIdx(null); setOverIdx(null);
  }

  // 드래그 중에만 document 레벨 이벤트 등록
  // (touchmove에 passive:false 필수 — React 합성 이벤트로는 preventDefault 불가)
  useEffect(()=>{
    if(dragIdx===null) return;
    const onMouseMove =(e)=>updateDrag(e.clientY);
    const onMouseUp   =()=>commitDrag();
    const onTouchMove =(e)=>{ e.preventDefault(); updateDrag(e.touches[0].clientY); };
    const onTouchEnd  =()=>commitDrag();
    document.addEventListener('mousemove',  onMouseMove);
    document.addEventListener('mouseup',    onMouseUp);
    document.addEventListener('touchmove',  onTouchMove,  {passive:false});
    document.addEventListener('touchend',   onTouchEnd);
    document.addEventListener('touchcancel',onTouchEnd);
    return ()=>{
      document.removeEventListener('mousemove',  onMouseMove);
      document.removeEventListener('mouseup',    onMouseUp);
      document.removeEventListener('touchmove',  onTouchMove);
      document.removeEventListener('touchend',   onTouchEnd);
      document.removeEventListener('touchcancel',onTouchEnd);
    };
  },[dragIdx]);

  return (
    <div style={{paddingBottom:80}}>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <div style={{flex:1,position:"relative"}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#aaa",fontSize:14,pointerEvents:"none"}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색..." style={{width:"100%",padding:"10px 10px 10px 34px",border:"1px solid #ddd",borderRadius:8,fontSize:14,boxSizing:"border-box"}}/>
        </div>
        <SaveBtn list={list} onForceSave={onForceSave}/>
        <button onClick={()=>setModal({contact:null})} style={{padding:"10px 16px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>+ 추가</button>
      </div>

      {canDrag&&filtered.length>1&&(
        <div style={{fontSize:11,color:"#bbb",marginBottom:10,textAlign:"center",letterSpacing:0.3}}>
          ☰ 핸들을 드래그해서 순서 변경
        </div>
      )}

      {filtered.length===0?(
        <div style={{textAlign:"center",padding:"50px 0",color:"#bbb"}}>
          <div style={{fontSize:40,marginBottom:10}}>👤</div>
          <div style={{fontSize:14}}>담당자가 없습니다.</div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10,userSelect:isDragging?"none":"auto"}}>
          {filtered.map((c,i)=>{
            const isDragItem = dragIdx===i;
            const isOver     = overIdx===i && !isDragItem;
            return (
              <div key={c.id}
                ref={el=>{ cardRefs.current[i]=el; }}
                style={{
                  background: isOver?"#eef7ff": isDragItem?"#f7f7f5":"#fff",
                  border:     isOver?"2px dashed #2980b9": isDragItem?"1px dashed #bbb":"1px solid #ddd",
                  borderLeft: isDragItem?"4px solid #ccc":isOver?"4px solid #2980b9":"4px solid #2980b9",
                  borderRadius:10, padding:"14px 14px",
                  opacity:    isDragItem?0.5:1,
                  transform:  isDragItem?"scale(1.015)":"none",
                  boxShadow:  isDragItem?"0 8px 24px rgba(0,0,0,0.13)":"none",
                  transition: isDragging?"opacity 0.1s,box-shadow 0.1s":"all 0.15s",
                }}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10}}>

                  {/* ── 드래그 핸들 ── */}
                  {canDrag&&(
                    <div
                      onMouseDown={e=>{ e.preventDefault(); beginDrag(i); }}
                      onTouchStart={()=>beginDrag(i)}
                      style={{
                        display:"flex",alignItems:"center",justifyContent:"center",
                        flexShrink:0,width:36,alignSelf:"stretch",
                        cursor:isDragItem?"grabbing":"grab",
                        touchAction:"none",
                        userSelect:"none",WebkitUserSelect:"none",
                        color:isDragItem?"#2980b9":"#ccc",
                        fontSize:20,letterSpacing:-1,
                      }}>☰</div>
                  )}

                  <div style={{flex:1,minWidth:0,pointerEvents:isDragging?"none":"auto"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
                      {c.company&&<span style={{fontSize:11,background:"#e8f4fd",color:"#2980b9",padding:"2px 8px",borderRadius:8,fontWeight:700}}>🏢 {c.company}</span>}
                      {c.title&&<span style={{fontSize:11,background:"#f0f0f0",color:"#555",padding:"2px 8px",borderRadius:8}}>{c.title}</span>}
                    </div>
                    <div style={{fontSize:16,fontWeight:700,color:"#1a1a2e",marginBottom:4}}>👤 {c.name||"(이름 없음)"}</div>
                    {c.role&&<div style={{fontSize:13,color:"#555",marginBottom:4}}>💼 {c.role}</div>}
                    <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                      {c.phone&&<a href={"tel:"+c.phone} style={{fontSize:13,color:"#2980b9",textDecoration:"none"}}>📞 {c.phone}</a>}
                      {c.email&&<a href={"mailto:"+c.email} style={{fontSize:13,color:"#27ae60",textDecoration:"none"}}>✉️ {c.email}</a>}
                    </div>
                    {c.memo&&<div style={{fontSize:12,color:"#888",marginTop:6,whiteSpace:"pre-wrap"}}>{c.memo}</div>}
                    <PhotoGallery photos={c.photos||(c.photo?[c.photo]:[])} thumbStyle={{width:80,height:80}}/>
                  </div>

                  <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0,pointerEvents:isDragging?"none":"auto"}}>
                    <button onClick={()=>!isDragging&&setModal({contact:c})} style={{padding:"5px 10px",border:"1px solid #ddd",borderRadius:6,background:"#fff",fontSize:11,cursor:"pointer",color:"#444"}}>수정</button>
                    <button onClick={()=>!isDragging&&del(c.id)} style={{padding:"5px 10px",border:"1px solid #fcc",borderRadius:6,background:"#fff",fontSize:11,cursor:"pointer",color:"#c0392b"}}>삭제</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* 담당자 입력 모달 */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setModal(null)}>

function DateView({entries,cats,selected,onSelect,onEdit,onDelete,onToggle}) {
  const groups={};
  entries.filter(e=>!e.done).forEach(e=>{const d=e.date||"날짜 없음";if(!groups[d])groups[d]=[];groups[d].push(e);});
  const sorted=Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0]));
  if(!sorted.length) return <Empty text="미완료 항목이 없습니다."/>;
  return <div>{sorted.map(([date,items])=>(<div key={date} style={{marginBottom:22}}><div style={{fontSize:12,fontWeight:700,color:"#1a1a2e",background:"#e8e8f0",padding:"5px 12px",borderRadius:6,marginBottom:8,display:"inline-block"}}>{"📅 "+date+" ("+items.length+"건)"}</div><div style={{display:"flex",flexDirection:"column",gap:8}}>{items.map(e=><Card key={e.id} entry={e} cats={cats} selected={selected.has(e.id)} onSelect={onSelect} onEdit={onEdit} onDelete={onDelete} onToggle={onToggle}/>)}</div></div>))}</div>;
}

function TagView({entries,cats,selected,onSelect,onEdit,onDelete,onToggle}) {
  const [activeTag,setActiveTag]=useState(null);
  const tagMap={};
  entries.filter(e=>!e.done).forEach(e=>(e.tags||[]).forEach(t=>{if(!tagMap[t])tagMap[t]=[];tagMap[t].push(e);}));
  const tags=Object.keys(tagMap).sort();
  if(!tags.length) return <Empty text="태그가 없습니다."/>;
  return (<div><div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:18}}>{tags.map(t=><TagChip key={t} tag={t+" ("+tagMap[t].length+")"} active={activeTag===t} onClick={()=>setActiveTag(activeTag===t?null:t)}/>)}</div>{activeTag&&(<div><div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:8}}>{"#"+activeTag+" — "+(tagMap[activeTag]||[]).length+"건"}</div><div style={{display:"flex",flexDirection:"column",gap:8}}>{(tagMap[activeTag]||[]).map(e=><Card key={e.id} entry={e} cats={cats} selected={selected.has(e.id)} onSelect={onSelect} onEdit={onEdit} onDelete={onDelete} onToggle={onToggle}/>)}</div></div>)}</div>);
}

function PasteTab({cats,onAddEntry}) {
  const [pasteText,setPasteText] = useState("");
  const [stage,setStage]         = useState("paste"); // "paste" | "assign"
  const [title,setTitle]         = useState("");
  const [body,setBody]           = useState("");
  const [category,setCategory]   = useState(cats[0]?.id||"task");
  const [priority,setPriority]   = useState("mid");
  const [errMsg,setErrMsg]       = useState("");
  const bodyRef2 = useRef(null);
  const autoResize2 = el=>{ if(!el) return; el.style.height="auto"; el.style.height=Math.max(100,el.scrollHeight)+"px"; };

  function applyPaste(){
    if(!pasteText.trim()){setErrMsg("텍스트를 입력해주세요.");return;}
    const lines=pasteText.split("\n").map(l=>l.trim()).filter(l=>l);
    setTitle(lines[0]||"");
    setBody(lines.slice(1).join("\n"));
    setCategory(cats[0]?.id||"task");
    setPriority("mid");
    setErrMsg("");
    setStage("assign");
  }
  function save(){
    if(!title.trim()){setErrMsg("제목을 입력해주세요.");return;}
    onAddEntry({category,priority,title:title.trim(),body,date:todayStr(),deadline:"",tags:[],photos:[],attachments:[],done:false});
    setPasteText("");setTitle("");setBody("");setErrMsg("");setStage("paste");
    alert("저장되었습니다.");
  }

  return (
    <div style={{paddingBottom:20}}>
      <div style={{background:"#f0f6fb",border:"1px solid #c5dff5",borderRadius:10,padding:"14px 16px",marginBottom:18,fontSize:13,color:"#1a4a6e",lineHeight:1.8}}>
        <div style={{fontWeight:700,marginBottom:4}}>📋 수첩 내용 빠르게 입력</div>
        <div>① 수첩 사진을 Claude 채팅창에 보내면 텍스트를 추출해드립니다</div>
        <div>② 추출된 텍스트를 아래에 붙여넣기</div>
        <div>③ 첫 줄은 제목, 나머지는 내용으로 자동 분리</div>
      </div>
      {errMsg&&<div style={{background:"#fdf2f2",border:"1px solid #f5c6c6",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#c0392b"}}>{"⚠️ "+errMsg}</div>}

      {stage==="paste"&&(
        <div>
          <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)}
            placeholder={"텍스트를 붙여넣으세요.\n첫 줄 → 제목 / 나머지 줄 → 내용으로 자동 분리됩니다."} rows={9}
            style={{width:"100%",padding:"14px",border:"1px solid #ddd",borderRadius:10,fontSize:14,boxSizing:"border-box",fontFamily:"inherit",resize:"vertical",lineHeight:1.8,color:"#222"}}/>
          <button onClick={applyPaste} disabled={!pasteText.trim()}
            style={{display:"block",width:"100%",marginTop:12,padding:"14px",background:pasteText.trim()?"#1a1a2e":"#ccc",color:"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:700,cursor:pasteText.trim()?"pointer":"not-allowed"}}>
            → 분류 선택
          </button>
        </div>
      )}

      {stage==="assign"&&(
        <div>
          <Lbl>제목 *</Lbl>
          <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="제목"
            style={{width:"100%",padding:"11px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:15,boxSizing:"border-box",marginBottom:12}}/>

          <Lbl>내용</Lbl>
          <textarea ref={bodyRef2} value={body}
            onChange={e=>{ setBody(e.target.value); autoResize2(e.target); }}
            placeholder="내용 (선택)" rows={5}
            style={{width:"100%",padding:"10px",border:"1px solid #ddd",borderRadius:8,fontSize:14,boxSizing:"border-box",fontFamily:"inherit",resize:"none",lineHeight:1.7,marginBottom:12,minHeight:100,overflow:"hidden"}}/>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
            <div><Lbl>분류</Lbl><MobSelect value={category} onChange={setCategory}>{cats.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</MobSelect></div>
            <div><Lbl>우선순위</Lbl><MobSelect value={priority} onChange={setPriority}>{PRIS.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}</MobSelect></div>
          </div>

          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setStage("paste");setErrMsg("");}}
              style={{padding:"13px 18px",border:"1px solid #ddd",borderRadius:10,background:"#fff",fontSize:15,cursor:"pointer",color:"#555"}}>← 수정</button>
            <button onClick={save}
              style={{flex:1,padding:"13px",border:"none",borderRadius:10,background:"#27ae60",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>✅ 저장</button>
          </div>
        </div>
      )}
    </div>
  );
}

//  사진 뷰어 (확대/축소 + 네비게이션 + 다운로드)
// ══════════════════════════════════════════════════════════
function PhotoViewer({photos, startIndex, onClose}) {
  const [idx,   setIdx]   = useState(startIndex||0);
  const [scale, setScale] = useState(1);
  const pinchRef = useRef(null);

  useEffect(()=>{ setScale(1); },[idx]);

  const prev = e=>{ e.stopPropagation(); setIdx(i=>(i-1+photos.length)%photos.length); };
  const next = e=>{ e.stopPropagation(); setIdx(i=>(i+1)%photos.length); };

  function download(e) {
    e.stopPropagation();
    const src=photos[idx];
    const ext=(src.match(/data:image\/(\w+)/)?.[1]||"jpeg").replace("jpeg","jpg");
    const a=document.createElement("a"); a.href=src; a.download="사진_"+(idx+1)+"."+ext;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
  function onWheel(e){ e.preventDefault(); setScale(s=>Math.max(0.5,Math.min(5,s*(e.deltaY<0?1.1:0.9)))); }
  function onTouchStart(e){ if(e.touches.length===2) pinchRef.current=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }
  function onTouchMove(e){
    if(e.touches.length===2&&pinchRef.current){
      e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      setScale(s=>Math.max(0.5,Math.min(5,s*(d/pinchRef.current)))); pinchRef.current=d;
    }
  }
  function onTouchEnd(){ pinchRef.current=null; }

  const OB={padding:"9px 16px",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",color:"#fff"};
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:600,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",touchAction:"none"}}
      onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,width:"100%",maxWidth:"95vw"}}>
        {/* 이미지 */}
        <div style={{overflow:"hidden",width:"95vw",maxHeight:"70vh",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10}}
          onWheel={onWheel} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
          <img src={photos[idx]} alt={"사진 "+(idx+1)}
            style={{maxWidth:"95vw",maxHeight:"70vh",objectFit:"contain",borderRadius:8,display:"block",
              transform:"scale("+scale+")",transformOrigin:"center",transition:"transform 0.05s",userSelect:"none",WebkitUserSelect:"none"}}/>
        </div>
        {/* 네비게이션 */}
        {photos.length>1&&(
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <button onClick={prev} style={{...OB,background:"rgba(255,255,255,0.18)",fontSize:22,padding:"5px 18px"}}>‹</button>
            <span style={{color:"#ccc",fontSize:13}}>{idx+1} / {photos.length}</span>
            <button onClick={next} style={{...OB,background:"rgba(255,255,255,0.18)",fontSize:22,padding:"5px 18px"}}>›</button>
          </div>
        )}
        {/* 줌 컨트롤 + 다운로드 + 닫기 */}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center"}}>
          <button onClick={e=>{e.stopPropagation();setScale(s=>Math.min(5,+(s+0.25).toFixed(2)));}} style={{...OB,background:"rgba(255,255,255,0.2)"}}>＋ 확대</button>
          <button onClick={e=>{e.stopPropagation();setScale(1);}} style={{...OB,background:"rgba(255,255,255,0.1)",fontWeight:400}}>{Math.round(scale*100)}%</button>
          <button onClick={e=>{e.stopPropagation();setScale(s=>Math.max(0.5,+(s-0.25).toFixed(2)));}} style={{...OB,background:"rgba(255,255,255,0.2)"}}>－ 축소</button>
          <button onClick={download} style={{...OB,background:"#27ae60"}}>⬇ 다운로드</button>
          <button onClick={e=>{e.stopPropagation();onClose();}} style={{...OB,background:"rgba(255,255,255,0.15)"}}>✕ 닫기</button>
        </div>
      </div>
    </div>
  );
}

function PhotoGallery({photos, thumbStyle}) {
  const [viewIdx, setViewIdx] = useState(null);
  if(!photos||!photos.length) return null;
  return (
    <>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>

          <img key={i} src={src} alt={"사진"+(i+1)}

function PasswordModal({onClose}) {
  const hasPw = !!localStorage.getItem(PW_KEY);
  const [cur,   setCur]   = useState('');
  const [next1, setNext1] = useState('');
  const [next2, setNext2] = useState('');
  const [err,   setErr]   = useState('');

  function save() {
    if(hasPw && cur !== localStorage.getItem(PW_KEY)){setErr('현재 비밀번호가 틀렸습니다.');return;}
    if(!next1){setErr('새 비밀번호를 입력해주세요.');return;}
    if(next1 !== next2){setErr('비밀번호가 일치하지 않습니다.');return;}
    localStorage.setItem(PW_KEY, next1);
    alert('비밀번호가 변경되었습니다.');
    onClose();
  }
  function removePw() {
    if(!window.confirm('비밀번호를 해제하시겠습니까?'))return;
    if(hasPw && cur !== localStorage.getItem(PW_KEY)){setErr('현재 비밀번호가 틀렸습니다.');return;}
    localStorage.removeItem(PW_KEY);
    alert('비밀번호가 해제되었습니다.');
    onClose();
  }
  const IS={width:'100%',padding:'12px 14px',border:'1px solid #ddd',borderRadius:9,fontSize:15,boxSizing:'border-box',marginBottom:10,fontFamily:'inherit'};
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:500,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:'16px 16px 0 0',padding:'24px 20px 36px',width:'100%',maxWidth:480,boxSizing:'border-box'}}>
        <div style={{width:40,height:4,background:'#ddd',borderRadius:2,margin:'0 auto 18px'}}/>
        <div style={{fontWeight:700,fontSize:16,color:'#1a1a2e',marginBottom:18}}>🔑 비밀번호 {hasPw?'변경':'설정'}</div>
        {err&&<div style={{background:'#fdf2f2',border:'1px solid #f5c6c6',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:13,color:'#c0392b'}}>{err}</div>}
        {hasPw&&<><div style={{fontSize:12,color:'#888',marginBottom:4}}>현재 비밀번호</div><input type="password" value={cur} onChange={e=>setCur(e.target.value)} placeholder="현재 비밀번호" style={IS} autoComplete="current-password"/></>}
        <div style={{fontSize:12,color:'#888',marginBottom:4}}>새 비밀번호</div>
        <input type="password" value={next1} onChange={e=>setNext1(e.target.value)} placeholder="새 비밀번호" style={IS} autoComplete="new-password"/>
        <div style={{fontSize:12,color:'#888',marginBottom:4}}>새 비밀번호 확인</div>
        <input type="password" value={next2} onChange={e=>setNext2(e.target.value)} onKeyDown={e=>e.key==='Enter'&&save()} placeholder="비밀번호 재입력" style={{...IS,marginBottom:16}} autoComplete="new-password"/>
        <button onClick={save} style={{width:'100%',padding:'13px',border:'none',borderRadius:10,background:'#1a1a2e',color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',marginBottom:8}}>저장</button>
        {hasPw&&<button onClick={removePw} style={{width:'100%',padding:'11px',border:'1px solid #fcc',borderRadius:10,background:'#fff',color:'#c0392b',fontSize:14,cursor:'pointer',marginBottom:8}}>비밀번호 해제</button>}
        <button onClick={onClose} style={{width:'100%',padding:'11px',border:'1px solid #ddd',borderRadius:10,background:'#fff',color:'#555',fontSize:14,cursor:'pointer'}}>취소</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
function LockScreen({onUnlock}) {
  const stored = localStorage.getItem(PW_KEY);
  const isSetup = !stored;
  const [pw,    setPw]    = useState('');
  const [pw2,   setPw2]   = useState('');
  const [input, setInput] = useState('');
  const [err,   setErr]   = useState('');
  const [mode,  setMode]  = useState(isSetup?'setup':'lock');
  const inputRef = useRef(null);

  useEffect(()=>{ setTimeout(()=>inputRef.current?.focus(),100); },[mode]);

  function unlock(){
    if(input === localStorage.getItem(PW_KEY)){
      sessionStorage.setItem(PW_SESSION,'1'); onUnlock();
    } else {
      setErr('비밀번호가 틀렸습니다. 다시 입력해주세요.');
      setInput(''); inputRef.current?.focus();
    }
  }
  function setup(){
    if(!pw){setErr('비밀번호를 입력해주세요.');return;}
    if(pw!==pw2){setErr('비밀번호가 일치하지 않습니다.');return;}
    localStorage.setItem(PW_KEY,pw);
    sessionStorage.setItem(PW_SESSION,'1'); onUnlock();
  }
  function skip(){ sessionStorage.setItem(PW_SESSION,'1'); onUnlock(); }

  const IS={width:'100%',padding:'14px',border:'2px solid #e0e0e0',borderRadius:10,fontSize:20,textAlign:'center',letterSpacing:8,boxSizing:'border-box',marginBottom:12,fontFamily:'inherit',outline:'none'};
  const IS2={...IS,letterSpacing:2,fontSize:15,textAlign:'left'};
  const BTN={width:'100%',padding:'14px',border:'none',borderRadius:10,background:'#1a1a2e',color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',marginBottom:8};

  return (
    <div style={{position:'fixed',inset:0,background:'#1a1a2e',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,zIndex:999}}>
      <div style={{background:'#fff',borderRadius:20,padding:'36px 28px',width:'100%',maxWidth:360,boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:10}}>🔒</div>
          <div style={{fontSize:22,fontWeight:700,color:'#1a1a2e'}}>업무수첩</div>
          <div style={{fontSize:13,color:'#aaa',marginTop:6}}>{mode==='setup'?'처음 사용하시는군요! 비밀번호를 설정해주세요':'비밀번호를 입력해주세요'}</div>
        </div>
        {err&&<div style={{background:'#fdf2f2',border:'1px solid #f5c6c6',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:13,color:'#c0392b',textAlign:'center'}}>{err}</div>}

        {mode==='lock'&&(
          <>
            <input ref={inputRef} type="password" value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&unlock()} placeholder="••••••" style={IS} autoComplete="current-password"/>
            <button onClick={unlock} style={BTN}>잠금 해제</button>
          </>
        )}
        {mode==='setup'&&(
          <>
            <div style={{fontSize:12,color:'#888',marginBottom:4}}>새 비밀번호</div>
            <input ref={inputRef} type="password" value={pw} onChange={e=>setPw(e.target.value)}
              placeholder="비밀번호 입력" style={IS2} autoComplete="new-password"/>
            <div style={{fontSize:12,color:'#888',marginBottom:4}}>비밀번호 확인</div>
            <input type="password" value={pw2} onChange={e=>setPw2(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&setup()}
              placeholder="비밀번호 재입력" style={{...IS2,marginBottom:16}} autoComplete="new-password"/>
            <button onClick={setup} style={BTN}>설정 완료</button>
            <button onClick={skip} style={{...BTN,background:'transparent',color:'#aaa',border:'1px solid #e0e0e0',fontWeight:400}}>건너뛰기 (비밀번호 없이 사용)</button>
          </>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
//  메인 앱
// ══════════════════════════════════════════════════════════
function App() {
  const [entries,    setEntries]    = useState([]);
  const [cats,       setCats]       = useState(DEFAULT_CATS);
  const [contacts,   setContacts]   = useState([]);
  const [tab,        setTab]        = useState("list");  // list|date|tag|paste|contact
  const [catFilter,  setCatFilter]  = useState("all");
  const [search,     setSearch]     = useState("");
  const [showDone,   setShowDone]   = useState(false);
  const [sortBy,     setSortBy]     = useState("priority");
  const [modal,      setModal]      = useState(null);
  const [showSidebar,setShowSidebar]= useState(false);
  const [showCatMgr, setShowCatMgr] = useState(false);
  const [selected,   setSelected]   = useState(new Set()); // 선택된 항목 id
  const [dbReady,    setDbReady]    = useState(false);
  const [syncStatus, setSyncStatus] = useState("idle"); // idle|syncing|ok|error
  const [unlocked,   setUnlocked]   = useState(()=>!!sessionStorage.getItem(PW_SESSION)||!localStorage.getItem(PW_KEY));
  const [showPwModal,setShowPwModal]= useState(false);
  const syncPushTimer  = useRef(null);
  const localDirtyRef  = useRef(false); // 사용자가 로컬에서 변경했을 때만 true → push 발생
  const dirtyCountRef  = useRef(0);     // 로컬 변경 카운터 — push 중 새 변경 감지용

  // ── IndexedDB 초기 로드 ──────────────────────────────
  useEffect(()=>{
    (async()=>{
      try {
        const [ents,savedCats,savedContacts]=await Promise.all([
          idbGetAll(STORES.entries),
          idbGetMeta("cats"),
          idbGetAll(STORES.contacts),
        ]);
        if(ents.length) setEntries(ents.map(migrateEntry).sort((a,b)=>b.createdAt-a.createdAt));
        if(savedCats)   setCats(savedCats);
        if(savedContacts.length) setContacts(savedContacts.map(migrateContact));
      } catch(e){ console.error("IDB load error",e); }
      setDbReady(true);
    })();
  },[]);

  // ── 변경 시 IndexedDB 저장 ───────────────────────────
  useEffect(()=>{ if(!dbReady) return; (async()=>{ await idbClear(STORES.entries); for(const e of entries) await idbPut(STORES.entries,e); })(); },[entries,dbReady]);
  useEffect(()=>{ if(!dbReady) return; idbSetMeta("cats",cats); },[cats,dbReady]);
  useEffect(()=>{ if(!dbReady) return; (async()=>{ await idbClear(STORES.contacts); for(const c of contacts) await idbPut(STORES.contacts,c); })(); },[contacts,dbReady]);

  // ── 최신 state를 ref로 유지 (stale closure 방지) ───────
  const dataRef = useRef({ entries, cats, contacts });
  useEffect(()=>{ dataRef.current = { entries, cats, contacts }; });

  // ── Pull + 항목별 병합 함수 ──────────────────────────
  const pullAndMerge = useCallback(async () => {
    setSyncStatus("syncing");
    try{
      const remote = await sbPull();
      if(remote){
        const { entries: curE, cats: curC, contacts: curCon } = dataRef.current;

        // 업무 항목: updatedAt 기준으로 최신 버전 유지
        const lMap = Object.fromEntries(curE.map(e=>[e.id,e]));
        const rMap = Object.fromEntries((remote.entries||[]).map(e=>[e.id,e]));
        const ids  = new Set([...Object.keys(lMap),...Object.keys(rMap)]);

        // 로컬 변경이 원격보다 새로운 항목이 있는지 확인 (cascade 방지)
        let hasLocalWins = false;
        const merged = Array.from(ids).map(id=>{
          const l=lMap[id], r=rMap[id];
          if(!l) return migrateEntry(r);
          if(!r){ hasLocalWins=true; return migrateEntry(l); }
          if((l.updatedAt||0) > (r.updatedAt||0)){ hasLocalWins=true; return migrateEntry(l); }
          return migrateEntry(r);
        });
        setEntries(merged.sort((a,b)=>b.createdAt-a.createdAt));

        // 분류: 원격 우선
        if(remote.cats && remote.cats.length) setCats(remote.cats);

        // 담당자 병합:
        //   ① 미push 변경 있음 → 로컬 순서 보호 (push 실패·대기 중 원상복구 방지)
        //   ② 깨끗한 상태 → 원격 순서 적용 (다른 기기의 드래그 반영)
        const rContacts = (remote.contacts||[]).map(migrateContact);
        const rIds = new Set(rContacts.map(c=>c.id));
        const lContacts = curCon.map(migrateContact);
        const lIds = new Set(lContacts.map(c=>c.id));
        const remoteOnly = rContacts.filter(c=>!lIds.has(c.id));
        const localOnly  = lContacts.filter(c=>!rIds.has(c.id));
        if(localDirtyRef.current) {
          // 미push 변경 있음 → 로컬 완전 신뢰
          // setContacts 생략: 이미 로컬 state 올바름, 불필요한 리렌더·타이머 리셋 방지
          hasLocalWins = true;
        } else {
          // 로컬 변경 없음 → 원격 순서 그대로 적용
          if(localOnly.length>0) hasLocalWins = true;
          setContacts([...rContacts, ...localOnly]);
        }

        // 로컬 변경이 없었다면 dirty 해제 (cascade push 방지)
        if(!hasLocalWins) localDirtyRef.current = false;
      }
      setSyncStatus("ok");
      return true;
    }catch(e){
      console.error("Supabase pull",e);
      setSyncStatus("error");
      return false;
    }
  },[]);

  // ── 앱 시작 시 Pull ──────────────────────────────────
  useEffect(()=>{
    if(!dbReady) return;
    pullAndMerge();
  },[dbReady]);

  // ── 탭/창 활성화 시 자동 Pull (기기 전환 대응) ────────
  useEffect(()=>{
    const handle=()=>{ if(!document.hidden) pullAndMerge(); };
    document.addEventListener("visibilitychange", handle);
    window.addEventListener("focus", handle);
    return ()=>{
      document.removeEventListener("visibilitychange", handle);
      window.removeEventListener("focus", handle);
    };
  },[pullAndMerge]);

  // ── Supabase 실시간 구독 (INSERT·UPDATE 모두 감지) ──
  useEffect(()=>{
    if(!dbReady) return;
    const channel = sb.channel("wb_changes")
      .on("postgres_changes",{ event:"*", schema:"public", table:"workbook_sync" },()=>{ pullAndMerge(); })
      .subscribe();
    return ()=>{ sb.removeChannel(channel); };
  },[dbReady, pullAndMerge]);

  // ── 데이터 변경 시 Supabase에 자동 Push (3초 디바운스, 로컬 변경 있을 때만) ──
  useEffect(()=>{
    if(!dbReady) return;
    if(!localDirtyRef.current) return; // ← 원격에서 당겨온 변경은 다시 올리지 않음 (cascade 방지)
    clearTimeout(syncPushTimer.current);
    syncPushTimer.current=setTimeout(async()=>{
      if(!localDirtyRef.current) return;
      const snapCount = dirtyCountRef.current;
      setSyncStatus("syncing");
      try{
        const { entries: e, cats: c, contacts: con } = dataRef.current;
        await sbPush(e,c,con);
        if(dirtyCountRef.current === snapCount) localDirtyRef.current = false;
        setSyncStatus("ok");
      }catch(e){ console.error("Supabase push",e); setSyncStatus("error"); }
    },3000);
  },[entries,cats,contacts,dbReady]);

  // ── 항목 CRUD ────────────────────────────────────────
  const openNew  = ()  => setModal({entry:null});
  const openEdit = (e) => setModal({entry:e});
  const closeModal=()  => setModal(null);

  function submitForm(form) {
    localDirtyRef.current = true; dirtyCountRef.current++;
    if(modal.entry) setEntries(p=>p.map(e=>e.id===modal.entry.id?{...form,id:modal.entry.id,createdAt:modal.entry.createdAt,updatedAt:Date.now()}:e));
    else            setEntries(p=>[{...form,id:uid(),createdAt:Date.now(),updatedAt:Date.now()},...p]);
    closeModal();
  }
  function deleteEntry(id){if(!window.confirm("삭제하시겠습니까?"))return;localDirtyRef.current=true;dirtyCountRef.current++;setEntries(p=>p.filter(e=>e.id!==id));setSelected(s=>{const n=new Set(s);n.delete(id);return n;});}
  function toggleDone(id){localDirtyRef.current=true;dirtyCountRef.current++;setEntries(p=>p.map(e=>e.id===id?{...e,done:!e.done,updatedAt:Date.now()}:e));}
  function addEntry(form){localDirtyRef.current=true;dirtyCountRef.current++;setEntries(p=>[{...form,id:uid(),createdAt:Date.now(),updatedAt:Date.now()},...p]);}

  // ── 선택 ─────────────────────────────────────────────
  function toggleSelect(id){setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});}
  function markDone(val){localDirtyRef.current=true;dirtyCountRef.current++;setEntries(p=>p.map(e=>selected.has(e.id)?{...e,done:val,updatedAt:Date.now()}:e));setSelected(new Set());}
  function deleteSelected(){localDirtyRef.current=true;dirtyCountRef.current++;setEntries(p=>p.filter(e=>!selected.has(e.id)));setSelected(new Set());}

  // ── Supabase 수동 동기화 ─────────────────────────────
  async function manualSync(){
    setSyncStatus("syncing");
    try{
      const remote=await sbPull();
      const {entries:curE,cats:curC,contacts:curCon}=dataRef.current;
      let finalEntries=curE,finalCats=curC,finalContacts=curCon;
      if(remote){
        if(remote.entries){
          const lMap=Object.fromEntries(curE.map(e=>[e.id,e]));
          const rMap=Object.fromEntries((remote.entries||[]).map(e=>[e.id,e]));
          const ids=new Set([...Object.keys(lMap),...Object.keys(rMap)]);
          finalEntries=Array.from(ids).map(id=>{ const l=lMap[id],r=rMap[id]; if(!l)return migrateEntry(r); if(!r)return migrateEntry(l); return migrateEntry(l.updatedAt>=r.updatedAt?l:r); });
          setEntries(finalEntries.sort((a,b)=>b.createdAt-a.createdAt));
        }
        if(remote.cats?.length){ finalCats=remote.cats; setCats(remote.cats); }
        if(remote.contacts?.length){
          const lCMap=Object.fromEntries(curCon.map(c=>[c.id,c]));
          const rCMap=Object.fromEntries(remote.contacts.map(c=>[c.id,c]));
          const cIds=new Set([...Object.keys(lCMap),...Object.keys(rCMap)]);
          finalContacts=Array.from(cIds).map(id=>lCMap[id]||rCMap[id]);
          setContacts(finalContacts);
        }
      }
      await sbPush(finalEntries,finalCats,finalContacts);
      localDirtyRef.current=false;
      setSyncStatus("ok");
      alert("동기화 완료!");
    }catch(e){ console.error("manual sync",e); setSyncStatus("error"); alert("동기화 오류: "+e.message); }
  }

  // ── 분류 저장 ────────────────────────────────────────
  function saveCatsWithMigrate(newCats){
    localDirtyRef.current=true; dirtyCountRef.current++;
    const ids=new Set(newCats.map(c=>c.id));const fallback=newCats[0]?.id;
    setEntries(p=>p.map(e=>ids.has(e.category)?e:{...e,category:fallback}));
    setCats(newCats);
  }
  // 담당자 저장 — dirty 플래그 + dataRef 즉시 동기화 (stale closure 방지)
  function saveContacts(next){
    localDirtyRef.current = true; dirtyCountRef.current++;
    dataRef.current = {...dataRef.current, contacts: next};
    setContacts(next);
  }

  // 담당자 탭 저장 버튼 — 즉시 Supabase push (3초 대기 없음)
  async function forceSaveContacts(nextContacts) {
    localDirtyRef.current = true; dirtyCountRef.current++;
    dataRef.current = {...dataRef.current, contacts: nextContacts}; // pull 경쟁 방지
    setContacts(nextContacts);
    const snapCount = dirtyCountRef.current; // push 시작 시점 카운터 스냅샷
    setSyncStatus("syncing");
    try {
      const { entries: e, cats: c } = dataRef.current;
      await sbPush(e, c, nextContacts);
      if(dirtyCountRef.current === snapCount) localDirtyRef.current = false;
      setSyncStatus("ok");
    } catch(err) {
      console.error("forceSave", err);
      setSyncStatus("error");
      throw err; // SaveBtn이 ⚠ 오류 표시할 수 있도록 re-throw
    }
  }

  // ── 필터/정렬 ────────────────────────────────────────
  const counts={};
  cats.forEach(c=>{counts[c.id]=entries.filter(e=>e.category===c.id&&!e.done).length;});
  const totalActive=entries.filter(e=>!e.done).length;

  const filtered=entries.filter(e=>{
    if(!showDone&&e.done) return false;
    if(catFilter!=="all"&&e.category!==catFilter) return false;
    if(search){const q=search.toLowerCase();return e.title.toLowerCase().includes(q)||(e.body||"").toLowerCase().includes(q)||(e.tags||[]).some(t=>t.toLowerCase().includes(q));}
    return true;
  }).sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    if(!a.done){
      if(sortBy==="date_desc") return b.updatedAt-a.updatedAt;
      if(sortBy==="date_asc")  return a.updatedAt-b.updatedAt;
      // 마감기한 임박 우선 → 마감기한 없으면 뒤로
      const aHas=!!a.deadline, bHas=!!b.deadline;
      if(aHas&&bHas){ const dc=a.deadline.localeCompare(b.deadline); if(dc!==0) return dc; }
      else if(aHas) return -1;
      else if(bHas) return 1;
      // 마감기한 같거나 둘 다 없으면 우선순위(긴급>보통>낮음)
      const pd=["high","mid","low"].indexOf(a.priority)-["high","mid","low"].indexOf(b.priority);
      if(pd!==0) return pd;
      return b.updatedAt-a.updatedAt;
    }
    return b.updatedAt-a.updatedAt;
  });

  const blankForm=()=>({category:catFilter!=="all"?catFilter:(cats[0]?.id||"task"),title:"",body:"",priority:"mid",date:todayStr(),deadline:"",tags:[],photos:[],attachments:[],done:false});
  const selActive = selected.size>0;
  const selBarRef  = useRef(null);

  if(!unlocked) return <LockScreen onUnlock={()=>setUnlocked(true)}/>;
  if(!dbReady) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontSize:15,color:"#888"}}>불러오는 중...</div>;

  return (
    <div style={{fontFamily:"'Noto Sans KR','Apple SD Gothic Neo',sans-serif",minHeight:"100vh",background:"#f2f2ef",WebkitFontSmoothing:"antialiased"}}>

      {/* 헤더 + 선택바 + 탭바 — 하나의 sticky 컨테이너로 묶어 높이 자동 계산 */}
      <div style={{position:"sticky",top:0,zIndex:200}}>
      <header style={{background:"#1a1a2e",color:"#fff",padding:"0 14px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 8px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setShowSidebar(s=>!s)} style={{background:"none",border:"none",color:"#fff",fontSize:20,cursor:"pointer",padding:"4px 6px",lineHeight:1}}>☰</button>
          <span style={{fontSize:17,fontWeight:700}}>📋 업무수첩</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:"#aaa"}}>{totalActive}건</span>
          <button
            onClick={manualSync}
            title={syncStatus==="error"?"동기화 오류 — 클릭하여 재시도":"지금 동기화"}
            style={{padding:"7px 10px",background:syncStatus==="error"?"rgba(231,76,60,0.2)":"transparent",
              border:"1px solid "+(syncStatus==="error"?"#e74c3c":"rgba(255,255,255,0.25)"),
              borderRadius:7,fontSize:12,cursor:"pointer",
              color:syncStatus==="error"?"#e74c3c":syncStatus==="syncing"?"#f1c40f":"#2ecc71",
              display:"flex",alignItems:"center",gap:4}}>
            <span style={{display:"inline-block",animation:syncStatus==="syncing"?"spin 1s linear infinite":"none"}}>
              {syncStatus==="syncing"?"⟳":syncStatus==="ok"?"☁":syncStatus==="error"?"⚠":"☁"}
            </span>
            <span style={{fontSize:10}}>{syncStatus==="syncing"?"동기화중":syncStatus==="ok"?"동기화됨":syncStatus==="error"?"오류":"동기화"}</span>
          </button>
          <button onClick={()=>exportXLSX(entries,cats,contacts)} style={{padding:"7px 10px",background:"#27ae60",color:"#fff",border:"none",borderRadius:7,fontSize:12,fontWeight:700,cursor:"pointer"}}>📊 엑셀</button>
          <button onClick={openNew} style={{padding:"7px 12px",background:"#e74c3c",color:"#fff",border:"none",borderRadius:7,fontSize:13,fontWeight:700,cursor:"pointer"}}>+ 추가</button>
        </div>
      </header>

      {/* 선택 액션 바 */}
      {selActive&&(
        <SelectionBar
          selected={selected} entries={entries} cats={cats}
          barRef={selBarRef}
          onClear={()=>setSelected(new Set())}
          onMarkDone={()=>markDone(true)}
          onMarkUndone={()=>markDone(false)}
          onDelete={deleteSelected}
        />
      )}

      {/* 사이드바 */}
      {showSidebar&&(
        <div style={{position:"fixed",inset:0,zIndex:250}} onClick={()=>setShowSidebar(false)}>
          <div onClick={e=>e.stopPropagation()} style={{position:"absolute",top:0,left:0,width:240,height:"100%",background:"#fff",boxShadow:"4px 0 20px rgba(0,0,0,0.15)",overflowY:"auto",paddingTop:60,boxSizing:"border-box"}}>
            <div style={{padding:"12px 14px 8px",fontSize:11,color:"#555",fontWeight:700}}>📋 분류로 바로가기</div>
            <div style={{padding:"0 14px 10px",fontSize:11,color:"#aaa",lineHeight:1.5}}>탭을 누르면 해당 분류만 표시됩니다</div>
            {[{id:"all",label:"전체",icon:"◈",color:"#34495e"},...cats].map(cat=>(
              <button key={cat.id} onClick={()=>{setCatFilter(cat.id);setTab("list");setShowSidebar(false);}} style={{width:"100%",textAlign:"left",padding:"11px 16px",border:"none",background:catFilter===cat.id&&tab===0?colorToBg(cat.color):"transparent",borderLeft:catFilter===cat.id&&tab===0?"3px solid "+cat.color:"3px solid transparent",cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontSize:14,color:catFilter===cat.id&&tab===0?cat.color:"#444",fontWeight:catFilter===cat.id&&tab===0?700:400}}>
                <span>{cat.icon}</span><span style={{flex:1}}>{cat.label}</span>
                {cat.id!=="all"&&counts[cat.id]>0&&<span style={{background:cat.color,color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:11,fontWeight:700}}>{counts[cat.id]}</span>}
              </button>
            ))}
            <div style={{margin:"12px 14px 0",borderTop:"1px solid #eee",paddingTop:12,display:"flex",flexDirection:"column",gap:10}}>
              <button onClick={()=>{setShowCatMgr(true);setShowSidebar(false);}} style={{width:"100%",padding:"10px",border:"1px dashed #ccc",borderRadius:8,background:"#fff",fontSize:13,cursor:"pointer",color:"#555",fontWeight:600}}>⚙️ 분류 관리</button>
              <button onClick={()=>{setShowPwModal(true);setShowSidebar(false);}} style={{width:"100%",padding:"10px",border:"1px dashed #ccc",borderRadius:8,background:"#fff",fontSize:13,cursor:"pointer",color:"#555",fontWeight:600}}>
                {localStorage.getItem(PW_KEY)?'🔑 비밀번호 변경':'🔒 비밀번호 설정'}
              </button>
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#666",cursor:"pointer"}}>
                <input type="checkbox" checked={showDone} onChange={e=>setShowDone(e.target.checked)} style={{accentColor:"#27ae60",width:16,height:16}}/>완료 항목 보기
              </label>
            </div>
          </div>
        </div>
      )}

      {/* 현재 탭 타이틀 바 */}
      <div style={{background:"#fff",borderBottom:"1px solid #e0e0da",padding:"10px 16px",display:"flex",alignItems:"center",gap:8}}>
        {tab==="list" && <>
          <span style={{fontSize:13,fontWeight:700,color:"#1a1a2e"}}>
            {catFilter==="all" ? "전체 목록" : (cats.find(c=>c.id===catFilter)?.icon+" "+cats.find(c=>c.id===catFilter)?.label)}
          </span>
          {catFilter!=="all" && <button onClick={()=>setCatFilter("all")} style={{fontSize:11,color:"#999",background:"none",border:"none",cursor:"pointer",padding:"2px 6px"}}>✕ 전체보기</button>}
        </>}
        {tab==="date"    && <span style={{fontSize:13,fontWeight:700,color:"#1a1a2e"}}>📅 날짜별</span>}
        {tab==="tag"     && <span style={{fontSize:13,fontWeight:700,color:"#1a1a2e"}}>🏷️ 태그별</span>}
        {tab==="paste"   && <span style={{fontSize:13,fontWeight:700,color:"#1a1a2e"}}>✏️ 텍스트 입력</span>}
        {tab==="contact" && <span style={{fontSize:13,fontWeight:700,color:"#1a1a2e"}}>👤 담당자</span>}
      </div>
      </div>{/* /sticky container */}

      {/* 콘텐츠 */}
      <div style={{padding:"14px 14px 80px",maxWidth:700,margin:"0 auto"}}>
        {tab==="list"&&(
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <div style={{flex:1,position:"relative"}}>
              <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#aaa",fontSize:14,pointerEvents:"none"}}>🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색..." style={{width:"100%",padding:"10px 10px 10px 34px",border:"1px solid #ddd",borderRadius:8,fontSize:14,boxSizing:"border-box"}}/>
            </div>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{padding:"10px 8px",border:"1px solid #ddd",borderRadius:8,fontSize:12,background:"#fff",color:"#555",flexShrink:0}}>
              <option value="priority">마감임박순</option>
              <option value="date_desc">최신순</option>
              <option value="date_asc">오래된순</option>
            </select>
          </div>
        )}

        {tab==="list"&&(filtered.length===0?<Empty/>:<div style={{display:"flex",flexDirection:"column",gap:8}}>{filtered.map(e=><Card key={e.id} entry={e} cats={cats} selected={selected.has(e.id)} onSelect={toggleSelect} onEdit={openEdit} onDelete={deleteEntry} onToggle={toggleDone}/>)}</div>)}
        {tab==="date"   &&<DateView entries={entries} cats={cats} selected={selected} onSelect={toggleSelect} onEdit={openEdit} onDelete={deleteEntry} onToggle={toggleDone}/>}
        {tab==="tag"    &&<TagView  entries={entries} cats={cats} selected={selected} onSelect={toggleSelect} onEdit={openEdit} onDelete={deleteEntry} onToggle={toggleDone}/>}
        {tab==="paste"  &&<PasteTab cats={cats} onAddEntry={addEntry}/>}
        {tab==="contact"&&<ContactTab contacts={contacts} onSave={saveContacts} onForceSave={forceSaveContacts}/>}
      </div>

      {/* FAB */}
      {tab!=="paste"&&tab!=="contact"&&(
        <button onClick={openNew} style={{position:"fixed",bottom:24,right:20,width:56,height:56,borderRadius:"50%",background:"#e74c3c",color:"#fff",border:"none",fontSize:28,cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,0.25)",zIndex:150,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      )}

      {/* 모달들 */}
      {modal&&<EntryModal initial={modal.entry||blankForm()} cats={cats} onSubmit={submitForm} onCancel={closeModal}/>}
      {showCatMgr&&<CatManageModal cats={cats} onSave={saveCatsWithMigrate} onClose={()=>setShowCatMgr(false)}/>}
      {showPwModal&&<PasswordModal onClose={()=>setShowPwModal(false)}/>}

      {/* ── 하단 네비게이션 바 ── */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,zIndex:190,background:"#fff",borderTop:"1px solid #e0e0da",display:"flex",alignItems:"stretch",boxShadow:"0 -2px 12px rgba(0,0,0,0.08)"}}>
        {NAV_TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"8px 2px 10px",border:"none",background:"none",cursor:"pointer",
              color:tab===t.id?"#1a1a2e":"#aaa",
              borderTop:tab===t.id?"2.5px solid #1a1a2e":"2.5px solid transparent",
              gap:3,transition:"all 0.15s",position:"relative"}}>
            <span style={{fontSize:20,lineHeight:1}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:tab===t.id?700:400}}>{t.label}</span>
            {t.id==="list"&&totalActive>0&&(
              <span style={{position:"absolute",top:5,right:"calc(50% - 16px)",background:"#e74c3c",color:"#fff",borderRadius:10,padding:"1px 5px",fontSize:9,fontWeight:700,lineHeight:1.4}}>
                {totalActive}
              </span>
            )}
          </button>
        ))}
      </nav>
    </div>
  );
}


const domRoot = ReactDOM.createRoot(document.getElementById('root'));
domRoot.render(React.createElement(App));
</script>
</body>
</html>
