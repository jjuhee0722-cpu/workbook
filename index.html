<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;
const XLSX_LIB = window.XLSX;

// ══════════════════════════════════════════════════════════
//  IndexedDB 레이어 — 캐시/쿠키 삭제에도 데이터 보존
// ══════════════════════════════════════════════════════════
const DB_NAME    = "workbook_db";
const DB_VERSION = 1;
const STORES     = { entries: "entries", cats: "cats", contacts: "contacts", meta: "meta" };

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      Object.values(STORES).forEach(name => {
        if (!db.objectStoreNames.contains(name)) db.createObjectStore(name, { keyPath: "id" });
      });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function idbGetAll(store) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, "readonly");
    const req = tx.objectStore(store).getAll();
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function idbPut(store, obj) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, "readwrite");
    const req = tx.objectStore(store).put(obj);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

async function idbDelete(store, id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, "readwrite");
    const req = tx.objectStore(store).delete(id);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

async function idbClear(store) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, "readwrite");
    const req = tx.objectStore(store).clear();
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

// meta 단건 (cats 등 배열 통째로 저장)
async function idbGetMeta(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORES.meta, "readonly");
    const req = tx.objectStore(STORES.meta).get(key);
    req.onsuccess = e => resolve(e.target.result?.value ?? null);
    req.onerror   = e => reject(e.target.error);
  });
}
async function idbSetMeta(key, value) {
  await idbPut(STORES.meta, { id: key, value });
}

// ══════════════════════════════════════════════════════════
//  상수
// ══════════════════════════════════════════════════════════
const DEFAULT_CATS = [
  { id: "task",    label: "할 일",       icon: "◆", color: "#c0392b" },
  { id: "agenda",  label: "안건",        icon: "▣", color: "#8e44ad" },
  { id: "meeting", label: "회의",        icon: "◉", color: "#16a085" },
  { id: "inquiry", label: "문의사항",    icon: "？", color: "#d35400" },
  { id: "climate", label: "기후부 요청", icon: "✦", color: "#27ae60" },
  { id: "boss",    label: "부장님 요청", icon: "★", color: "#e67e22" },
];

const ICON_OPTIONS  = ["◆","◇","▣","◉","？","✦","★","●","◎","▶","✔","☆","■","▲","◐"];
const COLOR_PRESETS = ["#c0392b","#e74c3c","#d35400","#e67e22","#f1c40f","#27ae60","#16a085","#2980b9","#8e44ad","#7f8c8d","#1a1a2e"];
const colorToBg     = c => c + "18";

const PRIS      = [{ id:"high",label:"긴급",color:"#c0392b"},{id:"mid",label:"보통",color:"#e67e22"},{id:"low",label:"낮음",color:"#7f8c8d"}];
// 하단 네비 탭
const NAV_TABS = [
  {id:"list",    label:"목록",    icon:"📋"},
  {id:"date",    label:"날짜별",  icon:"📅"},
  {id:"tag",     label:"태그별",  icon:"🏷️"},
  {id:"paste",   label:"텍스트",  icon:"✏️"},
  {id:"contact", label:"담당자",  icon:"👤"},
];

// ── 유틸 ─────────────────────────────────────────────────
const pad      = n => String(n).padStart(2,"0");
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const fmtTs    = ts => { const d=new Date(ts); return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; };
const uid      = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);

function fileToB64(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); });
}
function getDday(dl) {
  if(!dl) return null;
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(dl); d.setHours(0,0,0,0);
  const diff=Math.round((d-t)/86400000);
  if(diff===0) return {label:"D-Day",color:"#c0392b"};
  if(diff>0)   return {label:"D-"+diff, color:diff<=3?"#e67e22":"#2980b9"};
  return {label:"D+"+Math.abs(diff)+" 초과",color:"#aaa"};
}

// ── 엑셀 ─────────────────────────────────────────────────
function exportXLSX(entries, cats, contacts) {
  const getCat = id => cats.find(c=>c.id===id)||{label:id};
  const getPri = id => PRIS.find(p=>p.id===id)||PRIS[1];
  const wb = XLSX_LIB.utils.book_new();
  // 항목 시트
  const eRows = entries.map(e=>({
    분류:getCat(e.category).label, 우선순위:getPri(e.priority).label,
    날짜:e.date, 마감기한:e.deadline||"", 제목:e.title, 내용:e.body||"",
    태그:(e.tags||[]).join(", "), 완료:e.done?"완료":"미완료",
    등록일시:fmtTs(e.createdAt), 수정일시:fmtTs(e.updatedAt),
  }));
  const ws1 = XLSX_LIB.utils.json_to_sheet(eRows);
  ws1["!cols"]=[14,9,12,12,30,40,20,7,18,18].map(w=>({wch:w}));
  XLSX_LIB.utils.book_append_sheet(wb,ws1,"업무 항목");
  // 담당자 시트
  const cRows = contacts.map(c=>({ 회사:c.company||"", 직함:c.title||"", 성함:c.name||"", 업무:c.role||"", 연락처:c.phone||"", 이메일:c.email||"", 메모:c.memo||"" }));
  const ws2 = XLSX_LIB.utils.json_to_sheet(cRows);
  ws2["!cols"]=[18,14,12,20,16,24,30].map(w=>({wch:w}));
  XLSX_LIB.utils.book_append_sheet(wb,ws2,"담당자");
  XLSX_LIB.writeFile(wb,"업무수첩_"+todayStr()+".xlsx");
}

// ══════════════════════════════════════════════════════════
//  공통 UI 컴포넌트
// ══════════════════════════════════════════════════════════
const Lbl = ({children}) => <div style={{fontSize:11,color:"#888",marginBottom:3}}>{children}</div>;

function MobSelect({value,onChange,children,style}) {
  return (
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{width:"100%",padding:"10px 8px",border:"1px solid #ddd",borderRadius:8,fontSize:14,background:"#fff",boxSizing:"border-box",...style}}>
      {children}
    </select>
  );
}

function TagChip({tag,onRemove,onClick,active}) {
  return (
    <span onClick={onClick}
      style={{display:"inline-flex",alignItems:"center",gap:3,background:active?"#1a1a2e":"#ececec",color:active?"#fff":"#555",borderRadius:12,padding:"3px 10px",fontSize:11,cursor:onClick||onRemove?"pointer":"default",fontWeight:active?700:400,userSelect:"none"}}>
      #{tag}
      {onRemove&&<span onClick={e=>{e.stopPropagation();onRemove();}} style={{marginLeft:2,opacity:0.6,lineHeight:1}}>✕</span>}
    </span>
  );
}

function CatBadge({id,cats}) {
  const c=cats.find(x=>x.id===id)||cats[0]||{icon:"◆",label:id,color:"#888"};
  return <span style={{fontSize:10,background:colorToBg(c.color),color:c.color,padding:"2px 8px",borderRadius:10,fontWeight:700,border:"1px solid "+c.color+"33",whiteSpace:"nowrap"}}>{c.icon} {c.label}</span>;
}
function PriBadge({id}) {
  const p=PRIS.find(x=>x.id===id)||PRIS[1];
  return <span style={{fontSize:10,color:p.color,fontWeight:700,whiteSpace:"nowrap"}}>● {p.label}</span>;
}

// ══════════════════════════════════════════════════════════
//  항목 카드
// ══════════════════════════════════════════════════════════
function Card({entry,cats,selected,onSelect,onEdit,onDelete,onToggle}) {
  const cat  = cats.find(c=>c.id===entry.category)||cats[0]||{color:"#888"};
  const dday = getDday(entry.deadline);
  return (
    <div style={{background:selected?"#eef4ff":entry.done?"#f7f7f5":"#fff",border:"1px solid "+(selected?"#2980b9":entry.done?"#e5e5e0":"#ddd"),borderLeft:"4px solid "+(selected?"#2980b9":entry.done?"#bbb":cat.color),borderRadius:10,padding:"12px 14px",display:"flex",alignItems:"flex-start",gap:10,transition:"background 0.15s"}}>

      {/* 선택 체크박스 */}
      <div onClick={()=>onSelect(entry.id)} style={{marginTop:3,flexShrink:0,width:22,height:22,borderRadius:6,border:"2px solid "+(selected?"#2980b9":entry.done?"#27ae60":"#ccc"),background:selected?"#2980b9":entry.done?"#27ae60":"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
        {(selected||entry.done)&&<span style={{color:"#fff",fontSize:13,fontWeight:700}}>{selected?"✓":entry.done?"✓":""}</span>}
      </div>

      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:5}}>
          <CatBadge id={entry.category} cats={cats}/>
          {!entry.done&&<PriBadge id={entry.priority}/>}
          {entry.date&&<span style={{fontSize:10,color:"#bbb"}}>{"📅 "+entry.date}</span>}
          {entry.deadline&&!entry.done&&dday&&(
            <span style={{fontSize:10,fontWeight:700,color:dday.color,background:dday.color+"22",padding:"2px 7px",borderRadius:8}}>{"🗓 "+entry.deadline+" ("+dday.label+")"}</span>
          )}
          {entry.done&&<span style={{fontSize:10,color:"#27ae60",fontWeight:700}}>✓ 완료</span>}
        </div>
        <div style={{fontSize:15,fontWeight:600,lineHeight:1.4,wordBreak:"break-word",color:entry.done?"#999":"#1a1a2e",textDecoration:entry.done?"line-through":"none"}}>{entry.title}</div>
        {entry.body&&<div style={{fontSize:13,color:entry.done?"#bbb":"#666",marginTop:5,whiteSpace:"pre-wrap",wordBreak:"break-word",lineHeight:1.6}}>{entry.body}</div>}
        {entry.photo&&<img src={entry.photo} alt="첨부" style={{marginTop:8,maxWidth:"100%",maxHeight:200,objectFit:"contain",borderRadius:8,border:"1px solid #eee",display:"block",opacity:entry.done?0.5:1}}/>}
        {entry.tags&&entry.tags.length>0&&(
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:6,opacity:entry.done?0.5:1}}>
            {entry.tags.map(t=><TagChip key={t} tag={t}/>)}
          </div>
        )}
        <div style={{fontSize:10,color:"#ccc",marginTop:5}}>{fmtTs(entry.updatedAt)}</div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
        <button onClick={()=>onToggle(entry.id)} style={{padding:"5px 8px",border:"1px solid #ddd",borderRadius:6,background:"#fff",fontSize:11,cursor:"pointer",color:"#444",minWidth:44}}>{entry.done?"↩":"완료"}</button>
        <button onClick={()=>onEdit(entry)} style={{padding:"5px 8px",border:"1px solid #ddd",borderRadius:6,background:"#fff",fontSize:11,cursor:"pointer",color:"#444",minWidth:44}}>수정</button>
        <button onClick={()=>onDelete(entry.id)} style={{padding:"5px 8px",border:"1px solid #fcc",borderRadius:6,background:"#fff",fontSize:11,cursor:"pointer",color:"#c0392b",minWidth:44}}>삭제</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
//  선택 액션 바
// ══════════════════════════════════════════════════════════
function SelectionBar({selected,entries,cats,onClear,onMarkDone,onMarkUndone,onDelete,barRef}) {
  const selEntries  = entries.filter(e=>selected.has(e.id));
  const doneCount   = selEntries.filter(e=>e.done).length;
  const undoneCount = selEntries.length - doneCount;
  const catCounts   = {};
  selEntries.forEach(e=>{ catCounts[e.category]=(catCounts[e.category]||0)+1; });
  const catSummary  = Object.entries(catCounts).map(([id,cnt])=>{ const c=cats.find(x=>x.id===id)||{icon:"◆",label:id,color:"#888"}; return {c,cnt}; });

  return (
    <div ref={barRef} style={{background:"#1a1a2e",color:"#fff",padding:"8px 14px 10px",boxShadow:"0 3px 12px rgba(0,0,0,0.3)"}}>
      {/* 선택 요약 */}
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
        <span style={{fontWeight:700,fontSize:13}}>{selected.size}개 선택됨</span>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {catSummary.map(({c,cnt})=>(
            <span key={c.id||c.label} style={{fontSize:10,background:colorToBg(c.color),color:c.color,padding:"2px 7px",borderRadius:10,fontWeight:700,border:"1px solid "+c.color+"44"}}>
              {c.icon} {c.label} {cnt}
            </span>
          ))}
        </div>
      </div>
      {/* 선택 항목 제목 */}
      <div style={{fontSize:11,color:"#aaa",marginBottom:8,lineHeight:1.6,maxHeight:44,overflowY:"auto"}}>
        {selEntries.map(e=>(
          <span key={e.id} style={{display:"inline-block",background:"rgba(255,255,255,0.1)",borderRadius:5,padding:"1px 7px",margin:"2px 3px 2px 0"}}>
            {e.title.length>18?e.title.slice(0,18)+"…":e.title}
          </span>
        ))}
      </div>
      {/* 액션 */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {undoneCount>0&&<button onClick={onMarkDone}   style={{padding:"6px 12px",border:"none",borderRadius:7,background:"#27ae60",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>✓ 완료({undoneCount})</button>}
        {doneCount>0  &&<button onClick={onMarkUndone} style={{padding:"6px 12px",border:"none",borderRadius:7,background:"#e67e22",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>↩ 미완료({doneCount})</button>}
        <button onClick={()=>{if(window.confirm(selected.size+"개를 삭제하시겠습니까?"))onDelete();}} style={{padding:"6px 12px",border:"none",borderRadius:7,background:"#c0392b",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>🗑 삭제({selected.size})</button>
        <button onClick={onClear} style={{padding:"6px 10px",border:"1px solid rgba(255,255,255,0.3)",borderRadius:7,background:"transparent",color:"#ccc",fontSize:12,cursor:"pointer"}}>해제</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
//  항목 입력 모달
// ══════════════════════════════════════════════════════════
function EntryModal({initial,cats,onSubmit,onCancel}) {
  const [form,setForm]         = useState(initial);
  const [tagInput,setTagInput] = useState("");
  const [preview,setPreview]   = useState(initial.photo||null);
  const photoRef = useRef(null);
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const addTag=()=>{const t=tagInput.trim().replace(/^#/,"");if(!t||(form.tags||[]).includes(t)){setTagInput("");return;}f("tags",[...(form.tags||[]),t]);setTagInput("");};
  async function handlePhoto(file){try{const b=await fileToB64(file);setPreview(b);f("photo",b);}catch{}}

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onCancel}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"16px 16px 0 0",padding:"20px 18px 36px",width:"100%",maxWidth:600,maxHeight:"92vh",overflowY:"auto",boxSizing:"border-box"}}>
        <div style={{width:40,height:4,background:"#ddd",borderRadius:2,margin:"0 auto 16px"}}/>
        <div style={{fontWeight:700,fontSize:16,color:"#1a1a2e",marginBottom:16}}>{initial.id?"항목 수정":"새 항목 추가"}</div>

        <Lbl>분류</Lbl>
        <MobSelect value={form.category} onChange={v=>f("category",v)} style={{marginBottom:12}}>
          {cats.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
        </MobSelect>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div><Lbl>우선순위</Lbl><MobSelect value={form.priority} onChange={v=>f("priority",v)}>{PRIS.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}</MobSelect></div>
          <div><Lbl>작성 날짜</Lbl><input type="date" value={form.date} onChange={e=>f("date",e.target.value)} style={{width:"100%",padding:"10px 8px",border:"1px solid #ddd",borderRadius:8,fontSize:14,boxSizing:"border-box"}}/></div>
        </div>

        <Lbl>🗓 마감기한 (선택)</Lbl>
        <input type="date" value={form.deadline||""} onChange={e=>f("deadline",e.target.value)} style={{width:"100%",padding:"10px 8px",border:"1px solid #ddd",borderRadius:8,fontSize:14,boxSizing:"border-box",marginBottom:12}}/>

        <Lbl>제목 *</Lbl>
        <input value={form.title} onChange={e=>f("title",e.target.value)} placeholder="제목을 입력하세요"
          style={{width:"100%",padding:"11px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:15,boxSizing:"border-box",marginBottom:12}}/>

        <Lbl>내용</Lbl>
        <textarea value={form.body} onChange={e=>f("body",e.target.value)} placeholder="세부 내용..." rows={3}
          style={{width:"100%",padding:"10px",border:"1px solid #ddd",borderRadius:8,fontSize:14,resize:"vertical",boxSizing:"border-box",fontFamily:"inherit",marginBottom:12}}/>

        <Lbl>📷 사진 첨부 (선택)</Lbl>
        {preview?(
          <div style={{marginBottom:12,position:"relative",display:"inline-block"}}>
            <img src={preview} alt="미리보기" style={{maxWidth:"100%",maxHeight:180,objectFit:"contain",borderRadius:8,border:"1px solid #ddd",display:"block"}}/>
            <button onClick={()=>{setPreview(null);f("photo",null);}} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.55)",color:"#fff",border:"none",borderRadius:"50%",width:24,height:24,cursor:"pointer",fontSize:13}}>✕</button>
          </div>
        ):(
          <div style={{marginBottom:12}}>
            <button onClick={()=>photoRef.current?.click()} style={{width:"100%",padding:"10px",border:"2px dashed #ddd",borderRadius:8,background:"#fafafa",fontSize:13,cursor:"pointer",color:"#888"}}>📁 갤러리에서 선택</button>
            <input ref={photoRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{if(e.target.files[0])handlePhoto(e.target.files[0]);e.target.value="";}}/>
          </div>
        )}

        <Lbl>태그</Lbl>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>{(form.tags||[]).map(t=><TagChip key={t} tag={t} onRemove={()=>f("tags",form.tags.filter(x=>x!==t))}/>)}</div>
        <div style={{display:"flex",gap:6,marginBottom:20}}>
          <input value={tagInput} onChange={e=>setTagInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addTag();}}} placeholder="#태그 입력 후 Enter" style={{flex:1,padding:"10px",border:"1px solid #ddd",borderRadius:8,fontSize:14}}/>
          <button onClick={addTag} style={{padding:"10px 14px",border:"1px solid #ddd",borderRadius:8,background:"#fff",fontSize:13,cursor:"pointer"}}>추가</button>
        </div>

        <div style={{display:"flex",gap:10}}>
          <button onClick={onCancel} style={{flex:1,padding:"13px",border:"1px solid #ddd",borderRadius:10,background:"#fff",fontSize:15,cursor:"pointer",color:"#555"}}>취소</button>
          <button onClick={()=>{if(form.title.trim())onSubmit(form);}} style={{flex:2,padding:"13px",border:"none",borderRadius:10,background:"#1a1a2e",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>{initial.id?"수정 완료":"저장"}</button>
        </div>
      </div>
    </div>
  );
}

        <div style={{width:40,height:4,background:"#ddd",borderRadius:2,margin:"0 auto 16px"}}/>

function ContactTab({contacts,onSave}) {
  const [list,setList]       = useState(contacts);
  const [modal,setModal]     = useState(null); // null | { contact? }
  const [search,setSearch]   = useState("");

  useEffect(()=>{ setList(contacts); },[contacts]);

  const blank = ()=>({id:uid(),company:"",title:"",name:"",role:"",phone:"",email:"",memo:""});

  function save(form) {
    const next = modal.contact
      ? list.map(c=>c.id===modal.contact.id?{...form,id:modal.contact.id}:c)
      : [...list,{...form,id:uid()}];
    setList(next); onSave(next); setModal(null);
  }
  function del(id) {
    if(!window.confirm("삭제하시겠습니까?"))return;
    const next=list.filter(c=>c.id!==id); setList(next); onSave(next);
  }

  const filtered = list.filter(c=>{
    if(!search) return true;
    const q=search.toLowerCase();
    return [c.company,c.title,c.name,c.role,c.phone,c.email,c.memo].some(v=>(v||"").toLowerCase().includes(q));
  });

  return (
    <div style={{paddingBottom:80}}>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <div style={{flex:1,position:"relative"}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#aaa",fontSize:14,pointerEvents:"none"}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색..." style={{width:"100%",padding:"10px 10px 10px 34px",border:"1px solid #ddd",borderRadius:8,fontSize:14,boxSizing:"border-box"}}/>
        </div>
        <button onClick={()=>setModal({contact:null})} style={{padding:"10px 16px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>+ 추가</button>
      </div>

      {filtered.length===0?(
        <div style={{textAlign:"center",padding:"50px 0",color:"#bbb"}}>
          <div style={{fontSize:40,marginBottom:10}}>👤</div>
          <div style={{fontSize:14}}>담당자가 없습니다.</div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtered.map(c=>(
            <div key={c.id} style={{background:"#fff",border:"1px solid #ddd",borderLeft:"4px solid #2980b9",borderRadius:10,padding:"14px 14px"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
                    {c.company&&<span style={{fontSize:11,background:"#e8f4fd",color:"#2980b9",padding:"2px 8px",borderRadius:8,fontWeight:700}}>🏢 {c.company}</span>}
                    {c.title&&<span style={{fontSize:11,background:"#f0f0f0",color:"#555",padding:"2px 8px",borderRadius:8}}>{c.title}</span>}
                  </div>
                  <div style={{fontSize:16,fontWeight:700,color:"#1a1a2e",marginBottom:4}}>👤 {c.name||"(이름 없음)"}</div>
                  {c.role&&<div style={{fontSize:13,color:"#555",marginBottom:4}}>💼 {c.role}</div>}
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    {c.phone&&<a href={"tel:"+c.phone} style={{fontSize:13,color:"#2980b9",textDecoration:"none"}}>📞 {c.phone}</a>}
                    {c.email&&<a href={"mailto:"+c.email} style={{fontSize:13,color:"#27ae60",textDecoration:"none"}}>✉️ {c.email}</a>}
                  </div>
                  {c.memo&&<div style={{fontSize:12,color:"#888",marginTop:6,whiteSpace:"pre-wrap"}}>{c.memo}</div>}
                  {c.photo&&<img src={c.photo} alt="명함" style={{marginTop:8,maxWidth:"100%",maxHeight:140,objectFit:"contain",borderRadius:8,border:"1px solid #eee",display:"block"}}/>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                  <button onClick={()=>setModal({contact:c})} style={{padding:"5px 10px",border:"1px solid #ddd",borderRadius:6,background:"#fff",fontSize:11,cursor:"pointer",color:"#444"}}>수정</button>
                  <button onClick={()=>del(c.id)} style={{padding:"5px 10px",border:"1px solid #fcc",borderRadius:6,background:"#fff",fontSize:11,cursor:"pointer",color:"#c0392b"}}>삭제</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* 담당자 입력 모달 */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setModal(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"16px 16px 0 0",padding:"20px 18px 36px",width:"100%",maxWidth:560,maxHeight:"88vh",overflowY:"auto",boxSizing:"border-box"}}>
            <div style={{width:40,height:4,background:"#ddd",borderRadius:2,margin:"0 auto 16px"}}/>
            <ContactForm initial={modal.contact||blank()} onSubmit={save} onCancel={()=>setModal(null)}/>

      )}

  );
}

function ContactForm({initial,onSubmit,onCancel}) {

  async function handlePhoto(file){ try{ const b=await fileToB64(file); setPreview(b); f("photo",b); }catch{} }
  const fields=[
    {key:"company",label:"🏢 회사",   placeholder:"소속 기관 / 회사명"},
    {key:"title",  label:"🪪 직함",   placeholder:"직위 / 직책"},
    {key:"name",   label:"👤 성함 *", placeholder:"담당자 이름"},

  ];
  return (
    <div>
      <div style={{fontWeight:700,fontSize:16,color:"#1a1a2e",marginBottom:16}}>{initial.name?"담당자 수정":"담당자 추가"}</div>

      {/* 명함 사진 */}
      <Lbl>📇 명함 사진 (선택)</Lbl>

          <button onClick={()=>{setPreview(null);f("photo",null);}} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.55)",color:"#fff",border:"none",borderRadius:"50%",width:24,height:24,cursor:"pointer",fontSize:13}}>✕</button>

      )}

      {fields.map(({key,label,placeholder})=>(
        <div key={key} style={{marginBottom:12}}>
          <Lbl>{label}</Lbl>
          <input value={form[key]||""} onChange={e=>f(key,e.target.value)} placeholder={placeholder}
            style={{width:"100%",padding:"10px",border:"1px solid #ddd",borderRadius:8,fontSize:14,boxSizing:"border-box"}}/>
        </div>
      ))}
      <div style={{marginBottom:20}}>
        <Lbl>📝 메모</Lbl>

          style={{width:"100%",padding:"10px",border:"1px solid #ddd",borderRadius:8,fontSize:14,resize:"vertical",boxSizing:"border-box",fontFamily:"inherit"}}/>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={onCancel} style={{flex:1,padding:"13px",border:"1px solid #ddd",borderRadius:10,background:"#fff",fontSize:15,cursor:"pointer",color:"#555"}}>취소</button>
        <button onClick={()=>{if(form.name?.trim())onSubmit(form);else alert("성함을 입력해주세요.");}} style={{flex:2,padding:"13px",border:"none",borderRadius:10,background:"#1a1a2e",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>{initial.name?"수정 완료":"저장"}</button>
      </div>
    </div>
  );
}

//  날짜별 / 태그별 / 텍스트 입력 탭

function DateView({entries,cats,selected,onSelect,onEdit,onDelete,onToggle}) {
  const groups={};
  entries.filter(e=>!e.done).forEach(e=>{const d=e.date||"날짜 없음";if(!groups[d])groups[d]=[];groups[d].push(e);});
  const sorted=Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0]));
  if(!sorted.length) return <Empty text="미완료 항목이 없습니다."/>;
  return <div>{sorted.map(([date,items])=>(<div key={date} style={{marginBottom:22}}><div style={{fontSize:12,fontWeight:700,color:"#1a1a2e",background:"#e8e8f0",padding:"5px 12px",borderRadius:6,marginBottom:8,display:"inline-block"}}>{"📅 "+date+" ("+items.length+"건)"}</div><div style={{display:"flex",flexDirection:"column",gap:8}}>{items.map(e=><Card key={e.id} entry={e} cats={cats} selected={selected.has(e.id)} onSelect={onSelect} onEdit={onEdit} onDelete={onDelete} onToggle={onToggle}/>)}</div></div>))}</div>;
}

function TagView({entries,cats,selected,onSelect,onEdit,onDelete,onToggle}) {
  const [activeTag,setActiveTag]=useState(null);
  const tagMap={};
  entries.filter(e=>!e.done).forEach(e=>(e.tags||[]).forEach(t=>{if(!tagMap[t])tagMap[t]=[];tagMap[t].push(e);}));
  const tags=Object.keys(tagMap).sort();
  if(!tags.length) return <Empty text="태그가 없습니다."/>;
  return (<div><div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:18}}>{tags.map(t=><TagChip key={t} tag={t+" ("+tagMap[t].length+")"} active={activeTag===t} onClick={()=>setActiveTag(activeTag===t?null:t)}/>)}</div>{activeTag&&(<div><div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:8}}>{"#"+activeTag+" — "+(tagMap[activeTag]||[]).length+"건"}</div><div style={{display:"flex",flexDirection:"column",gap:8}}>{(tagMap[activeTag]||[]).map(e=><Card key={e.id} entry={e} cats={cats} selected={selected.has(e.id)} onSelect={onSelect} onEdit={onEdit} onDelete={onDelete} onToggle={onToggle}/>)}</div></div>)}</div>);
}

function PasteTab({cats,onAddEntry}) {
  const [pasteText,setPasteText]=useState(""); const [errMsg,setErrMsg]=useState(""); const [lines,setLines]=useState([]); const [assigns,setAssigns]=useState({}); const [editingId,setEditingId]=useState(null); const [editVal,setEditVal]=useState(""); const [stage,setStage]=useState("paste");
  function applyPaste(){const ls=pasteText.split("\n").map(l=>l.trim()).filter(l=>l.length>0);if(!ls.length){setErrMsg("텍스트를 입력해주세요.");return;}const mapped=ls.map((t,i)=>({id:i,text:t}));const init={};mapped.forEach(l=>{init[l.id]={text:l.text,category:cats[0]?.id||"task",priority:"mid",include:true};});setLines(mapped);setAssigns(init);setErrMsg("");setStage("assign");}
  function saveAll(){const toSave=Object.values(assigns).filter(a=>a.include&&a.text.trim());if(!toSave.length){setErrMsg("저장할 항목을 선택하세요.");return;}toSave.forEach(a=>onAddEntry({category:a.category,priority:a.priority,title:a.text.trim(),body:"",date:todayStr(),deadline:"",tags:[],photo:null,done:false}));setPasteText("");setLines([]);setAssigns({});setErrMsg("");setStage("paste");alert(toSave.length+"개 항목이 저장되었습니다.");}
  return (
    <div style={{paddingBottom:20}}>
      <div style={{background:"#f0f6fb",border:"1px solid #c5dff5",borderRadius:10,padding:"14px 16px",marginBottom:18,fontSize:13,color:"#1a4a6e",lineHeight:1.8}}><div style={{fontWeight:700,marginBottom:4}}>📋 수첩 내용 빠르게 입력</div><div>① 수첩 사진을 Claude 채팅창에 보내면 텍스트를 추출해드립니다</div><div>② 추출된 텍스트를 아래에 붙여넣기</div><div>③ 분류·우선순위 선택 후 저장</div></div>
      {errMsg&&<div style={{background:"#fdf2f2",border:"1px solid #f5c6c6",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#c0392b"}}>{"⚠️ "+errMsg}</div>}
      {stage==="paste"&&(<div><textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder={"줄마다 항목 하나씩 입력하세요."} rows={9} style={{width:"100%",padding:"14px",border:"1px solid #ddd",borderRadius:10,fontSize:14,boxSizing:"border-box",fontFamily:"inherit",resize:"vertical",lineHeight:1.8,color:"#222"}}/><button onClick={applyPaste} disabled={!pasteText.trim()} style={{display:"block",width:"100%",marginTop:12,padding:"14px",background:pasteText.trim()?"#1a1a2e":"#ccc",color:"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:700,cursor:pasteText.trim()?"pointer":"not-allowed"}}>→ 분류 선택</button></div>)}
      {stage==="assign"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:14,fontWeight:700,color:"#222"}}>{"분류 선택 ("+lines.length+"개)"}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setStage("paste")} style={{padding:"8px 14px",border:"1px solid #ddd",borderRadius:8,background:"#fff",fontSize:13,cursor:"pointer",color:"#555"}}>← 수정</button>
              <button onClick={()=>setAssigns(p=>{const n={...p};Object.keys(n).forEach(k=>n[k]={...n[k],include:true});return n;})} style={{padding:"8px 12px",border:"1px solid #ddd",borderRadius:8,background:"#fff",fontSize:12,cursor:"pointer"}}>전체선택</button>
              <button onClick={saveAll} style={{padding:"8px 18px",border:"none",borderRadius:8,background:"#27ae60",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>✅ 저장</button>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {lines.map(line=>{const a=assigns[line.id]||{};const cat=cats.find(c=>c.id===a.category)||cats[0]||{color:"#888"};const isEd=editingId===line.id;return(
              <div key={line.id} style={{background:a.include?"#fff":"#f5f5f5",border:"1px solid "+(a.include?cat.color+"55":"#ddd"),borderLeft:"4px solid "+(a.include?cat.color:"#ccc"),borderRadius:10,padding:"12px 14px",opacity:a.include?1:0.5}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
                  <input type="checkbox" checked={!!a.include} onChange={e=>setAssigns(p=>({...p,[line.id]:{...p[line.id],include:e.target.checked}}))} style={{marginTop:3,width:18,height:18,accentColor:cat.color,flexShrink:0,cursor:"pointer"}}/>
                  <div style={{flex:1,minWidth:0}}>
                    {isEd?(<div style={{display:"flex",gap:6,marginBottom:6}}><input value={editVal} onChange={e=>setEditVal(e.target.value)} style={{flex:1,padding:"8px 10px",border:"1px solid #aaa",borderRadius:7,fontSize:14}} onKeyDown={e=>{if(e.key==="Enter"){setAssigns(p=>({...p,[line.id]:{...p[line.id],text:editVal}}));setEditingId(null);}}}/><button onClick={()=>{setAssigns(p=>({...p,[line.id]:{...p[line.id],text:editVal}}));setEditingId(null);}} style={{padding:"8px 12px",border:"none",borderRadius:7,background:"#1a1a2e",color:"#fff",fontSize:13,cursor:"pointer"}}>확인</button><button onClick={()=>setEditingId(null)} style={{padding:"8px 10px",border:"1px solid #ddd",borderRadius:7,background:"#fff",fontSize:13,cursor:"pointer"}}>✕</button></div>):(<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{flex:1,fontSize:14,fontWeight:600,color:"#1a1a2e",wordBreak:"break-word"}}>{a.text}</span><button onClick={()=>{setEditingId(line.id);setEditVal(a.text);}} style={{padding:"5px 10px",border:"1px solid #ddd",borderRadius:6,background:"#fff",fontSize:12,cursor:"pointer",flexShrink:0}}>✏️</button></div>)}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,paddingLeft:28}}>
                  <div><div style={{fontSize:10,color:"#888",marginBottom:3}}>분류</div><MobSelect value={a.category||cats[0]?.id} onChange={v=>setAssigns(p=>({...p,[line.id]:{...p[line.id],category:v}}))}>{cats.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</MobSelect></div>
                  <div><div style={{fontSize:10,color:"#888",marginBottom:3}}>우선순위</div><MobSelect value={a.priority||"mid"} onChange={v=>setAssigns(p=>({...p,[line.id]:{...p[line.id],priority:v}}))}>{PRIS.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}</MobSelect></div>
                </div>
              </div>
            );})}
          </div>
        </div>
      )}
    </div>
  );
}

const Empty=({text="항목이 없습니다."})=>(<div style={{textAlign:"center",padding:"50px 0",color:"#bbb"}}><div style={{fontSize:40,marginBottom:10}}>📝</div><div style={{fontSize:14}}>{text}</div></div>);

// ══════════════════════════════════════════════════════════
//  메인 앱
// ══════════════════════════════════════════════════════════
function App() {
  const [entries,    setEntries]    = useState([]);
  const [cats,       setCats]       = useState(DEFAULT_CATS);
  const [contacts,   setContacts]   = useState([]);
  const [tab,        setTab]        = useState("list");  // list|date|tag|paste|contact
  const [catFilter,  setCatFilter]  = useState("all");
  const [search,     setSearch]     = useState("");
  const [showDone,   setShowDone]   = useState(false);
  const [sortBy,     setSortBy]     = useState("priority");
  const [modal,      setModal]      = useState(null);
  const [showSidebar,setShowSidebar]= useState(false);
  const [showCatMgr, setShowCatMgr] = useState(false);
  const [selected,   setSelected]   = useState(new Set()); // 선택된 항목 id
  const [dbReady,    setDbReady]    = useState(false);

  // ── IndexedDB 초기 로드 ──────────────────────────────
  useEffect(()=>{
    (async()=>{
      try {
        const [ents,savedCats,savedContacts]=await Promise.all([
          idbGetAll(STORES.entries),
          idbGetMeta("cats"),
          idbGetAll(STORES.contacts),
        ]);
        if(ents.length) setEntries(ents.sort((a,b)=>b.createdAt-a.createdAt));
        if(savedCats)   setCats(savedCats);
        if(savedContacts.length) setContacts(savedContacts);
      } catch(e){ console.error("IDB load error",e); }
      setDbReady(true);
    })();
  },[]);

  // ── 변경 시 IndexedDB 저장 ───────────────────────────
  useEffect(()=>{ if(!dbReady) return; (async()=>{ await idbClear(STORES.entries); for(const e of entries) await idbPut(STORES.entries,e); })(); },[entries,dbReady]);
  useEffect(()=>{ if(!dbReady) return; idbSetMeta("cats",cats); },[cats,dbReady]);
  useEffect(()=>{ if(!dbReady) return; (async()=>{ await idbClear(STORES.contacts); for(const c of contacts) await idbPut(STORES.contacts,c); })(); },[contacts,dbReady]);

  // ── 항목 CRUD ────────────────────────────────────────
  const openNew  = ()  => setModal({entry:null});
  const openEdit = (e) => setModal({entry:e});
  const closeModal=()  => setModal(null);

  function submitForm(form) {
    if(modal.entry) setEntries(p=>p.map(e=>e.id===modal.entry.id?{...form,id:modal.entry.id,createdAt:modal.entry.createdAt,updatedAt:Date.now()}:e));
    else            setEntries(p=>[{...form,id:uid(),createdAt:Date.now(),updatedAt:Date.now()},...p]);
    closeModal();
  }
  function deleteEntry(id){if(!window.confirm("삭제하시겠습니까?"))return;setEntries(p=>p.filter(e=>e.id!==id));setSelected(s=>{const n=new Set(s);n.delete(id);return n;});}
  function toggleDone(id){setEntries(p=>p.map(e=>e.id===id?{...e,done:!e.done,updatedAt:Date.now()}:e));}
  function addEntry(form){setEntries(p=>[{...form,id:uid(),createdAt:Date.now(),updatedAt:Date.now()},...p]);}

  // ── 선택 ─────────────────────────────────────────────
  function toggleSelect(id){setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});}
  function markDone(val){setEntries(p=>p.map(e=>selected.has(e.id)?{...e,done:val,updatedAt:Date.now()}:e));setSelected(new Set());}
  function deleteSelected(){setEntries(p=>p.filter(e=>!selected.has(e.id)));setSelected(new Set());}

  // ── 분류 저장 ────────────────────────────────────────
  function saveCatsWithMigrate(newCats){
    const ids=new Set(newCats.map(c=>c.id));const fallback=newCats[0]?.id;
    setEntries(p=>p.map(e=>ids.has(e.category)?e:{...e,category:fallback}));
    setCats(newCats);
  }

  // ── 필터/정렬 ────────────────────────────────────────
  const counts={};
  cats.forEach(c=>{counts[c.id]=entries.filter(e=>e.category===c.id&&!e.done).length;});
  const totalActive=entries.filter(e=>!e.done).length;

  const filtered=entries.filter(e=>{
    if(!showDone&&e.done) return false;
    if(catFilter!=="all"&&e.category!==catFilter) return false;
    if(search){const q=search.toLowerCase();return e.title.toLowerCase().includes(q)||(e.body||"").toLowerCase().includes(q)||(e.tags||[]).some(t=>t.toLowerCase().includes(q));}
    return true;
  }).sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    if(!a.done){
      if(sortBy==="date_desc") return b.updatedAt-a.updatedAt;
      if(sortBy==="date_asc")  return a.updatedAt-b.updatedAt;
      const pd=["high","mid","low"].indexOf(a.priority)-["high","mid","low"].indexOf(b.priority);
      if(pd!==0) return pd;
      if(a.deadline&&b.deadline) return a.deadline.localeCompare(b.deadline);
      if(a.deadline) return -1; if(b.deadline) return 1;
      return b.updatedAt-a.updatedAt;
    }
    return b.updatedAt-a.updatedAt;
  });

  const blankForm=()=>({category:catFilter!=="all"?catFilter:(cats[0]?.id||"task"),title:"",body:"",priority:"mid",date:todayStr(),deadline:"",tags:[],photo:null,done:false});
  const selActive = selected.size>0;
  const selBarRef  = useRef(null);

  if(!dbReady) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontSize:15,color:"#888"}}>불러오는 중...</div>;

  return (
    <div style={{fontFamily:"'Noto Sans KR','Apple SD Gothic Neo',sans-serif",minHeight:"100vh",background:"#f2f2ef",WebkitFontSmoothing:"antialiased"}}>

      {/* 헤더 + 선택바 + 탭바 — 하나의 sticky 컨테이너로 묶어 높이 자동 계산 */}
      <div style={{position:"sticky",top:0,zIndex:200}}>
      <header style={{background:"#1a1a2e",color:"#fff",padding:"0 14px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 8px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setShowSidebar(s=>!s)} style={{background:"none",border:"none",color:"#fff",fontSize:20,cursor:"pointer",padding:"4px 6px",lineHeight:1}}>☰</button>
          <span style={{fontSize:17,fontWeight:700}}>📋 업무수첩</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:"#aaa"}}>{totalActive}건</span>
          <button onClick={()=>exportXLSX(entries,cats,contacts)} style={{padding:"7px 10px",background:"#27ae60",color:"#fff",border:"none",borderRadius:7,fontSize:12,fontWeight:700,cursor:"pointer"}}>📊 엑셀</button>
          <button onClick={openNew} style={{padding:"7px 12px",background:"#e74c3c",color:"#fff",border:"none",borderRadius:7,fontSize:13,fontWeight:700,cursor:"pointer"}}>+ 추가</button>
        </div>
      </header>

      {/* 선택 액션 바 */}
      {selActive&&(
        <SelectionBar
          selected={selected} entries={entries} cats={cats}
          barRef={selBarRef}
          onClear={()=>setSelected(new Set())}
          onMarkDone={()=>markDone(true)}
          onMarkUndone={()=>markDone(false)}
          onDelete={deleteSelected}
        />
      )}

      {/* 사이드바 */}
      {showSidebar&&(
        <div style={{position:"fixed",inset:0,zIndex:250}} onClick={()=>setShowSidebar(false)}>
          <div onClick={e=>e.stopPropagation()} style={{position:"absolute",top:0,left:0,width:240,height:"100%",background:"#fff",boxShadow:"4px 0 20px rgba(0,0,0,0.15)",overflowY:"auto",paddingTop:60,boxSizing:"border-box"}}>
            <div style={{padding:"12px 14px 8px",fontSize:11,color:"#555",fontWeight:700}}>📋 분류로 바로가기</div>
            <div style={{padding:"0 14px 10px",fontSize:11,color:"#aaa",lineHeight:1.5}}>탭을 누르면 해당 분류만 표시됩니다</div>
            {[{id:"all",label:"전체",icon:"◈",color:"#34495e"},...cats].map(cat=>(
              <button key={cat.id} onClick={()=>{setCatFilter(cat.id);setTab("list");setShowSidebar(false);}} style={{width:"100%",textAlign:"left",padding:"11px 16px",border:"none",background:catFilter===cat.id&&tab===0?colorToBg(cat.color):"transparent",borderLeft:catFilter===cat.id&&tab===0?"3px solid "+cat.color:"3px solid transparent",cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontSize:14,color:catFilter===cat.id&&tab===0?cat.color:"#444",fontWeight:catFilter===cat.id&&tab===0?700:400}}>
                <span>{cat.icon}</span><span style={{flex:1}}>{cat.label}</span>
                {cat.id!=="all"&&counts[cat.id]>0&&<span style={{background:cat.color,color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:11,fontWeight:700}}>{counts[cat.id]}</span>}
              </button>
            ))}
            <div style={{margin:"12px 14px 0",borderTop:"1px solid #eee",paddingTop:12,display:"flex",flexDirection:"column",gap:10}}>
              <button onClick={()=>{setShowCatMgr(true);setShowSidebar(false);}} style={{width:"100%",padding:"10px",border:"1px dashed #ccc",borderRadius:8,background:"#fff",fontSize:13,cursor:"pointer",color:"#555",fontWeight:600}}>⚙️ 분류 관리</button>
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#666",cursor:"pointer"}}>
                <input type="checkbox" checked={showDone} onChange={e=>setShowDone(e.target.checked)} style={{accentColor:"#27ae60",width:16,height:16}}/>완료 항목 보기
              </label>
            </div>
          </div>
        </div>
      )}

      {/* 현재 탭 타이틀 바 */}
      <div style={{background:"#fff",borderBottom:"1px solid #e0e0da",padding:"10px 16px",display:"flex",alignItems:"center",gap:8}}>
        {tab==="list" && <>
          <span style={{fontSize:13,fontWeight:700,color:"#1a1a2e"}}>
            {catFilter==="all" ? "전체 목록" : (cats.find(c=>c.id===catFilter)?.icon+" "+cats.find(c=>c.id===catFilter)?.label)}
          </span>
          {catFilter!=="all" && <button onClick={()=>setCatFilter("all")} style={{fontSize:11,color:"#999",background:"none",border:"none",cursor:"pointer",padding:"2px 6px"}}>✕ 전체보기</button>}
        </>}
        {tab==="date"    && <span style={{fontSize:13,fontWeight:700,color:"#1a1a2e"}}>📅 날짜별</span>}
        {tab==="tag"     && <span style={{fontSize:13,fontWeight:700,color:"#1a1a2e"}}>🏷️ 태그별</span>}
        {tab==="paste"   && <span style={{fontSize:13,fontWeight:700,color:"#1a1a2e"}}>✏️ 텍스트 입력</span>}
        {tab==="contact" && <span style={{fontSize:13,fontWeight:700,color:"#1a1a2e"}}>👤 담당자</span>}
      </div>
      </div>{/* /sticky container */}

      {/* 콘텐츠 */}
      <div style={{padding:"14px 14px 80px",maxWidth:700,margin:"0 auto"}}>
        {tab==="list"&&(
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <div style={{flex:1,position:"relative"}}>
              <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#aaa",fontSize:14,pointerEvents:"none"}}>🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색..." style={{width:"100%",padding:"10px 10px 10px 34px",border:"1px solid #ddd",borderRadius:8,fontSize:14,boxSizing:"border-box"}}/>
            </div>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{padding:"10px 8px",border:"1px solid #ddd",borderRadius:8,fontSize:12,background:"#fff",color:"#555",flexShrink:0}}>
              <option value="priority">긴급순</option>
              <option value="date_desc">최신순</option>
              <option value="date_asc">오래된순</option>
            </select>
          </div>
        )}

        {tab==="list"&&(filtered.length===0?<Empty/>:<div style={{display:"flex",flexDirection:"column",gap:8}}>{filtered.map(e=><Card key={e.id} entry={e} cats={cats} selected={selected.has(e.id)} onSelect={toggleSelect} onEdit={openEdit} onDelete={deleteEntry} onToggle={toggleDone}/>)}</div>)}
        {tab==="date"   &&<DateView entries={entries} cats={cats} selected={selected} onSelect={toggleSelect} onEdit={openEdit} onDelete={deleteEntry} onToggle={toggleDone}/>}
        {tab==="tag"    &&<TagView  entries={entries} cats={cats} selected={selected} onSelect={toggleSelect} onEdit={openEdit} onDelete={deleteEntry} onToggle={toggleDone}/>}
        {tab==="paste"  &&<PasteTab cats={cats} onAddEntry={addEntry}/>}
        {tab==="contact"&&<ContactTab contacts={contacts} onSave={setContacts}/>}
      </div>

      {/* FAB */}
      {tab!=="paste"&&tab!=="contact"&&(
        <button onClick={openNew} style={{position:"fixed",bottom:24,right:20,width:56,height:56,borderRadius:"50%",background:"#e74c3c",color:"#fff",border:"none",fontSize:28,cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,0.25)",zIndex:150,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      )}

      {/* 모달들 */}
      {modal&&<EntryModal initial={modal.entry||blankForm()} cats={cats} onSubmit={submitForm} onCancel={closeModal}/>}
      {showCatMgr&&<CatManageModal cats={cats} onSave={saveCatsWithMigrate} onClose={()=>setShowCatMgr(false)}/>}

      {/* ── 하단 네비게이션 바 ── */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,zIndex:190,background:"#fff",borderTop:"1px solid #e0e0da",display:"flex",alignItems:"stretch",boxShadow:"0 -2px 12px rgba(0,0,0,0.08)"}}>
        {NAV_TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"8px 2px 10px",border:"none",background:"none",cursor:"pointer",
              color:tab===t.id?"#1a1a2e":"#aaa",
              borderTop:tab===t.id?"2.5px solid #1a1a2e":"2.5px solid transparent",
              gap:3,transition:"all 0.15s",position:"relative"}}>
            <span style={{fontSize:20,lineHeight:1}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:tab===t.id?700:400}}>{t.label}</span>
            {t.id==="list"&&totalActive>0&&(
              <span style={{position:"absolute",top:5,right:"calc(50% - 16px)",background:"#e74c3c",color:"#fff",borderRadius:10,padding:"1px 5px",fontSize:9,fontWeight:700,lineHeight:1.4}}>
                {totalActive}
              </span>
            )}
          </button>
        ))}
      </nav>
    </div>
  );
}


const domRoot = ReactDOM.createRoot(document.getElementById('root'));
domRoot.render(React.createElement(App));
</script>
</body>
</html>
